<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>海豚社区 · H代币实时交易排行榜（修复版）</title>
    <!-- ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #f5f7fb;
            color: #1e293b;
            padding: 24px 20px 40px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: rgba(124, 58, 237, 0.12);
            color: #6d28d9;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ddd6fe;
        }
        .network-status {
            background: white;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 15px 40px -15px rgba(124,58,237,0.15);
            border: 1px solid #f0e9ff;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header i {
            color: #7c3aed;
            background: #f5f3ff;
            padding: 8px;
            border-radius: 12px;
        }

        /* 开关 */
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #7c3aed;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .search-input {
            flex: 3;
            min-width: 300px;
            padding: 14px 20px;
            border: 2px solid #e9e2f5;
            border-radius: 60px;
            font-size: 1rem;
        }
        .search-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px #ede9fe;
        }
        .btn-primary {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 8px 20px -8px #7c3aed;
        }
        .btn-primary:hover {
            background: #6d28d9;
        }
        .btn-outline {
            background: white;
            border: 2px solid #e9e2f5;
            color: #4b5563;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }

        .tx-stream {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid #f0e9ff;
        }
        .tx-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f0ff;
            font-size: 0.9rem;
        }
        .tx-row.highlight {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
        .tx-hash {
            width: 120px;
            font-family: monospace;
            color: #7c3aed;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-address {
            width: 140px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-amount {
            width: 100px;
            font-weight: 600;
            text-align: right;
        }

        .rank-list {
            margin-top: 16px;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0e9ff;
        }
        .rank-num {
            width: 40px;
            font-weight: 700;
            color: #7c3aed;
        }
        .rank-addr {
            flex: 1;
            font-family: monospace;
        }
        .rank-vol {
            font-weight: 700;
        }

        .query-box {
            background: #faf8ff;
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 16px 0;
        }
        .stat-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #7c3aed;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
        }
        .range-info {
            font-size: 0.9rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>🐬 海豚社区 · H代币实时排行榜</h1>
            <div class="badge">
                <i class="fa-regular fa-clock"></i> 查询范围: <span id="blockRange">加载中...</span>
            </div>
        </div>
        <div class="network-status">
            <span><i class="fa-regular fa-database"></i> X Layer 链上数据</span>
            <span><i class="fa-regular fa-rotate"></i> <span id="updateTime">-</span></span>
        </div>
    </div>

    <!-- 统计开关 -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-regular fa-sliders"></i> 统计规则</h3>
            <div class="toggle-switch">
                <span>包含所有转账</span>
                <label class="switch">
                    <input type="checkbox" id="includeTransfers" checked>
                    <span class="slider"></span>
                </label>
                <span style="color:#64748b;">(开启后所有Transfer都计入)</span>
            </div>
        </div>
        <p style="color:#64748b;"><i class="fa-regular fa-circle-info"></i> 默认包含所有转账（买入/卖出/转账）。关闭后仅统计与DEX交互的交易。</p>
    </div>

    <!-- 搜索地址 -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-regular fa-magnifying-glass"></i> 查询地址</h3>
        </div>
        <div class="search-row">
            <input type="text" id="searchAddress" class="search-input" placeholder="输入0x地址">
            <button id="searchBtn" class="btn-primary"><i class="fa-regular fa-search"></i> 查询</button>
            <button id="clearSearchBtn" class="btn-outline">清除</button>
        </div>
        <div id="searchResult" style="display: none;"></div>
    </div>

    <!-- 手动查询交易哈希 -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-regular fa-hashtag"></i> 手动查询交易哈希</h3>
        </div>
        <div class="search-row">
            <input type="text" id="txHashInput" class="search-input" placeholder="输入0x交易哈希 (66位)">
            <button id="queryTxBtn" class="btn-primary"><i class="fa-regular fa-check"></i> 查询</button>
        </div>
        <div id="txQueryResult" style="display: none;" class="query-box"></div>
    </div>

    <!-- 实时交易流 + 排行榜 -->
    <div class="dashboard-grid">
        <div class="card col-8">
            <div class="card-header">
                <h3><i class="fa-regular fa-rss"></i> 实时交易流 (最新50笔)</h3>
                <span class="badge" id="txCount">0</span>
            </div>
            <div class="tx-stream" id="txStream">
                <div style="text-align:center; padding:40px;">加载中...</div>
            </div>
        </div>
        <div class="card col-4">
            <div class="card-header">
                <h3><i class="fa-regular fa-ranking-star"></i> 累计交易量 TOP 20</h3>
            </div>
            <div class="rank-list" id="rankList">
                <div style="text-align:center; padding:20px;">加载中...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 海豚社区 · 数据基于X Layer公共RPC · 每60秒自动刷新</p>
        <p>H合约: 0x867fdd2eef548f80808d0c9065cd55f57e207777</p>
    </div>
</div>

<script>
(function() {
    // --- 配置 ---
    const H_CONTRACT = '0x867fdd2eef548f80808d0c9065cd55f57e207777';
    const RPC_LIST = [
        'https://rpc.xlayer.tech',
        'https://xlayerrpc.okx.com',
        'https://xlayer.drpc.org',
        'https://endpoints.omniatech.io/v1/xlayer/mainnet/public'
    ];
    const TOKEN_DECIMALS = 18;
    const MAX_TXS = 50;
    const BLOCK_RANGE = 200000; // 最近约7天 (X Layer 3秒/块 ≈ 20万块/7天)

    // DEX合约列表 (用于判断交易)
    const DEX_CONTRACTS = [
        '0xa38e5b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f',
        '0xb45e2b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f',
        '0xc55e5b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f'
    ].map(addr => addr.toLowerCase());

    // --- 全局变量 ---
    let provider = new ethers.providers.JsonRpcProvider(RPC_LIST[0]);
    let currentRpcIndex = 0;
    let allTxs = [];
    let addressStats = new Map();
    let top20 = [];
    let refreshTimer = null;
    let isLoading = false;
    let includeTransfers = true; // 默认包含转账

    // --- UI 元素 ---
    const blockRangeSpan = document.getElementById('blockRange');
    const updateTimeSpan = document.getElementById('updateTime');
    const txCountSpan = document.getElementById('txCount');
    const txStreamDiv = document.getElementById('txStream');
    const rankListDiv = document.getElementById('rankList');
    const searchAddressInput = document.getElementById('searchAddress');
    const searchBtn = document.getElementById('searchBtn');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchResultDiv = document.getElementById('searchResult');
    const txHashInput = document.getElementById('txHashInput');
    const queryTxBtn = document.getElementById('queryTxBtn');
    const txQueryResultDiv = document.getElementById('txQueryResult');
    const includeTransfersCheck = document.getElementById('includeTransfers');

    // --- 切换RPC ---
    function switchRpc() {
        currentRpcIndex = (currentRpcIndex + 1) % RPC_LIST.length;
        provider = new ethers.providers.JsonRpcProvider(RPC_LIST[currentRpcIndex]);
        console.log('切换到RPC:', RPC_LIST[currentRpcIndex]);
    }

    // --- 获取最新区块 ---
    async function getLatestBlock() {
        try {
            return await provider.getBlockNumber();
        } catch (e) {
            switchRpc();
            return await provider.getBlockNumber();
        }
    }

    // --- 获取日志 ---
    async function fetchLogs(fromBlock, toBlock) {
        const filter = {
            address: H_CONTRACT,
            topics: [ethers.utils.id('Transfer(address,address,uint256)')],
            fromBlock: ethers.utils.hexValue(fromBlock),
            toBlock: ethers.utils.hexValue(toBlock)
        };
        try {
            return await provider.getLogs(filter);
        } catch (e) {
            console.error('getLogs失败', e);
            switchRpc();
            return await provider.getLogs(filter);
        }
    }

    // --- 解析单笔交易 (带重试) ---
    async function parseLog(log) {
        try {
            if (!log.topics || log.topics.length < 3) return null;
            const from = '0x' + log.topics[1].slice(26);
            const to = '0x' + log.topics[2].slice(26);
            const value = BigInt(log.data);
            const amount = Number(ethers.utils.formatUnits(value, TOKEN_DECIMALS));

            // 获取交易收据和详情
            const receipt = await provider.getTransactionReceipt(log.transactionHash);
            if (!receipt) return null;
            const tx = await provider.getTransaction(log.transactionHash);
            if (!tx) return null;

            const toAddr = tx.to ? tx.to.toLowerCase() : '';
            const isSwap = DEX_CONTRACTS.includes(toAddr);

            return {
                txHash: log.transactionHash,
                from,
                to,
                amount,
                blockNumber: parseInt(log.blockNumber, 16),
                isSwap,
                time: null
            };
        } catch (e) {
            console.warn('解析日志失败', log.transactionHash, e);
            return null;
        }
    }

    // --- 批量解析日志 ---
    async function parseLogs(logs) {
        const results = [];
        const batchSize = 10;
        for (let i = 0; i < logs.length; i += batchSize) {
            const batch = logs.slice(i, i + batchSize);
            const settled = await Promise.allSettled(batch.map(log => parseLog(log)));
            settled.forEach((result, idx) => {
                if (result.status === 'fulfilled' && result.value) {
                    results.push(result.value);
                }
            });
            await new Promise(r => setTimeout(r, 100)); // 避免请求过频
        }
        return results;
    }

    // --- 补充区块时间 ---
    async function enrichTimes(txs) {
        const blocks = [...new Set(txs.slice(0, 20).map(t => t.blockNumber))];
        const times = {};
        await Promise.allSettled(blocks.map(async bn => {
            try {
                const block = await provider.getBlock(bn);
                times[bn] = block.timestamp * 1000;
            } catch {}
        }));
        return txs.map(tx => ({
            ...tx,
            time: times[tx.blockNumber] ? new Date(times[tx.blockNumber]).toLocaleString() : '--'
        }));
    }

    // --- 更新统计 ---
    function updateStats(txs, includeTransfers) {
        const stats = new Map();
        for (const tx of txs) {
            // 根据开关过滤
            if (!includeTransfers && !tx.isSwap) continue;
            const from = tx.from.toLowerCase();
            const to = tx.to.toLowerCase();
            stats.set(from, (stats.get(from) || 0) + tx.amount);
            stats.set(to, (stats.get(to) || 0) + tx.amount);
        }
        addressStats = stats;
        top20 = Array.from(stats.entries())
            .map(([addr, vol]) => ({ addr, vol }))
            .sort((a, b) => b.vol - a.vol)
            .slice(0, 20);
    }

    // --- 渲染 ---
    function renderTxStream(txs, highlightAddr) {
        if (txs.length === 0) {
            txStreamDiv.innerHTML = '<div style="text-align:center; padding:40px;">暂无交易</div>';
            return;
        }
        const highlightLower = highlightAddr ? highlightAddr.toLowerCase() : null;
        let html = '';
        txs.slice(0, MAX_TXS).forEach(tx => {
            const isHighlight = highlightLower && (tx.from.toLowerCase() === highlightLower || tx.to.toLowerCase() === highlightLower);
            const rowClass = isHighlight ? 'tx-row highlight' : 'tx-row';
            const shortHash = tx.txHash.slice(0, 10) + '…' + tx.txHash.slice(-6);
            const fromShort = tx.from.slice(0, 6) + '…' + tx.from.slice(-4);
            const toShort = tx.to.slice(0, 6) + '…' + tx.to.slice(-4);
            html += `<div class="${rowClass}">
                <span class="tx-hash" title="${tx.txHash}">${shortHash}</span>
                <span class="tx-address" title="${tx.from}">${fromShort}</span>
                <span class="tx-address" title="${tx.to}">→ ${toShort}</span>
                <span class="tx-amount">${tx.amount.toFixed(2)} H</span>
                <span style="margin-left: auto; color:#94a3b8;">${tx.time || '--'}</span>
            </div>`;
        });
        txStreamDiv.innerHTML = html;
        txCountSpan.innerText = txs.length + ' 笔';
    }

    function renderRanking() {
        if (top20.length === 0) {
            rankListDiv.innerHTML = '<div style="text-align:center; padding:20px;">暂无数据</div>';
            return;
        }
        let html = '';
        top20.forEach((item, idx) => {
            const shortAddr = item.addr.slice(0, 6) + '…' + item.addr.slice(-4);
            html += `<div class="rank-item">
                <span class="rank-num">${idx+1}</span>
                <span class="rank-addr" title="${item.addr}">${shortAddr}</span>
                <span class="rank-vol">${item.vol.toFixed(2)} H</span>
            </div>`;
        });
        rankListDiv.innerHTML = html;
    }

    // --- 刷新主数据 ---
    async function refreshData() {
        if (isLoading) return;
        isLoading = true;
        updateTimeSpan.innerHTML = '<i class="fa-regular fa-spinner fa-spin"></i> 更新中...';
        try {
            const latest = await getLatestBlock();
            const fromBlock = Math.max(latest - BLOCK_RANGE, 0);
            blockRangeSpan.innerText = `${fromBlock.toLocaleString()} ～ ${latest.toLocaleString()}`;

            const logs = await fetchLogs(fromBlock, latest);
            const parsed = await parseLogs(logs);
            const enriched = await enrichTimes(parsed);
            allTxs = enriched;

            includeTransfers = includeTransfersCheck.checked;
            updateStats(enriched, includeTransfers);
            renderTxStream(enriched, searchAddressInput.value.trim());
            renderRanking();

            updateTimeSpan.innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error('刷新失败', e);
            updateTimeSpan.innerText = '更新失败，尝试切换节点';
            switchRpc();
        } finally {
            isLoading = false;
        }
    }

    // --- 搜索地址 ---
    function searchAddress(addr) {
        if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
            alert('请输入有效的0x地址');
            return;
        }
        const addrLower = addr.toLowerCase();
        const addrTxs = allTxs.filter(tx => {
            if (!includeTransfers && !tx.isSwap) return false;
            return tx.from.toLowerCase() === addrLower || tx.to.toLowerCase() === addrLower;
        });
        const totalVol = addrTxs.reduce((sum, tx) => sum + tx.amount, 0);
        const rank = Array.from(addressStats.entries())
            .sort((a, b) => b[1] - a[1])
            .findIndex(([a]) => a === addrLower) + 1;

        let txsHtml = '';
        addrTxs.slice(0, 20).forEach(tx => {
            const fromShort = tx.from.slice(0,6) + '…' + tx.from.slice(-4);
            const toShort = tx.to.slice(0,6) + '…' + tx.to.slice(-4);
            txsHtml += `<tr><td>${fromShort} → ${toShort}</td><td>${tx.amount.toFixed(2)} H</td><td>${tx.time}</td></tr>`;
        });

        searchResultDiv.innerHTML = `
            <div class="query-box">
                <div class="stat-grid">
                    <div class="stat-item"><div class="stat-value">${totalVol.toFixed(2)}</div><div>累计H</div></div>
                    <div class="stat-item"><div class="stat-value">${addrTxs.length}</div><div>交易笔数</div></div>
                    <div class="stat-item"><div class="stat-value">${rank > 0 ? '#'+rank : '未上榜'}</div><div>排名</div></div>
                </div>
                <h4 style="margin:16px 0 8px;">最近20笔交易</h4>
                <div style="max-height:300px; overflow-y:auto; border:1px solid #e9e2f5; border-radius:16px;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr><th>方向</th><th>数量</th><th>时间</th></tr></thead>
                        <tbody>${txsHtml || '<tr><td colspan="3" style="text-align:center;">无交易记录</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
        searchResultDiv.style.display = 'block';
        renderTxStream(allTxs, addr);
    }

    function clearSearch() {
        searchAddressInput.value = '';
        searchResultDiv.style.display = 'none';
        renderTxStream(allTxs, null);
    }

    // --- 手动查询交易哈希 ---
    async function queryTxHash(txHash) {
        if (!txHash || !txHash.startsWith('0x') || txHash.length !== 66) {
            txQueryResultDiv.style.display = 'block';
            txQueryResultDiv.innerHTML = '<div style="color:#ef4444;">❌ 无效的交易哈希</div>';
            return;
        }
        try {
            const receipt = await provider.getTransactionReceipt(txHash);
            if (!receipt) {
                txQueryResultDiv.style.display = 'block';
                txQueryResultDiv.innerHTML = '<div>❌ 交易未确认或不存在</div>';
                return;
            }
            const tx = await provider.getTransaction(txHash);
            const logs = receipt.logs.filter(l => l.address && l.address.toLowerCase() === H_CONTRACT.toLowerCase());
            if (logs.length === 0) {
                txQueryResultDiv.style.display = 'block';
                txQueryResultDiv.innerHTML = '<div>❌ 该交易不包含H代币转账</div>';
                return;
            }
            let details = '';
            logs.forEach((log, i) => {
                const from = '0x' + log.topics[1].slice(26);
                const to = '0x' + log.topics[2].slice(26);
                const value = BigInt(log.data);
                const amt = ethers.utils.formatUnits(value, TOKEN_DECIMALS);
                details += `<div>[${i+1}] ${from} → ${to} 数量: ${amt} H</div>`;
            });
            const toAddr = tx.to ? tx.to.toLowerCase() : '';
            const isSwap = DEX_CONTRACTS.includes(toAddr);
            const inStats = allTxs.some(t => t.txHash.toLowerCase() === txHash.toLowerCase());
            txQueryResultDiv.style.display = 'block';
            txQueryResultDiv.innerHTML = `
                <div style="background:${inStats ? '#e6f7e6' : '#fff3e6'}; padding:16px; border-radius:16px;">
                    <strong>${inStats ? '✅ 交易已计入统计' : '⚠️ 交易未在本次查询范围内'}</strong><br>
                    交易哈希: ${txHash}<br>
                    区块: ${receipt.blockNumber}<br>
                    DEX交易: ${isSwap ? '是' : '否'}<br>
                    H转账记录:<br>${details}
                </div>
            `;
        } catch (e) {
            txQueryResultDiv.style.display = 'block';
            txQueryResultDiv.innerHTML = `<div style="color:#ef4444;">❌ 查询失败: ${e.message}</div>`;
        }
    }

    // --- 事件绑定 ---
    searchBtn.addEventListener('click', () => searchAddress(searchAddressInput.value.trim()));
    clearSearchBtn.addEventListener('click', clearSearch);
    queryTxBtn.addEventListener('click', () => queryTxHash(txHashInput.value.trim()));
    includeTransfersCheck.addEventListener('change', function() {
        includeTransfers = this.checked;
        updateStats(allTxs, includeTransfers);
        renderRanking();
        if (searchAddressInput.value.trim()) {
            searchAddress(searchAddressInput.value.trim()); // 刷新搜索结果
        }
    });

    // --- 初始化 ---
    async function init() {
        await refreshData();
        refreshTimer = setInterval(refreshData, 60000); // 每分钟
    }

    init();

    window.addEventListener('beforeunload', () => {
        if (refreshTimer) clearInterval(refreshTimer);
    });
})();
</script>
</body>
</html>
