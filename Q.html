<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>H代币·实时交易监控 + 地址绑定统计</title>
    <!-- 引入 ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f8fafc;
            color: #1e293b;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px -15px rgba(124,58,237,0.2);
            border: 1px solid #e9e2f5;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1.5px dashed #ddd6fe;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }
        .card-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f2937;
        }
        .emoji {
            font-size: 1.7rem;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        .address-input {
            flex: 3;
            min-width: 280px;
            padding: 14px 18px;
            border: 1px solid #d8cdf0;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
        }
        .address-input:focus {
            outline: 2px solid #b79cf9;
            border-color: #7c3aed;
        }
        .btn-primary {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 18px -6px rgba(124, 58, 237, 0.4);
            transition: 0.1s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: white;
            border: 1.5px solid #b094f0;
            color: #5b21b6;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .stat-item {
            background: #f5f3ff;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
        }
        .stat-label {
            color: #475569;
            font-size: 0.9rem;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e4dcf5;
            background: white;
            max-height: 500px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f8f4ff;
            padding: 14px 12px;
            color: #4b5563;
            font-weight: 600;
            border-bottom: 1px solid #d8d0f0;
            position: sticky;
            top: 0;
            background: #f8f4ff;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f0ecf9;
        }
        .highlight {
            background-color: #fff9e6;
            font-weight: 500;
            color: #7c3aed;
        }
        .tx-hash {
            font-family: monospace;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .address {
            font-family: monospace;
        }
        .note {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .footer {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 22px;
        }
        .badge {
            background: #ede9fe;
            color: #5b21b6;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ddd6fe;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡️ H代币 实时交易监控</h1>
    <div class="subtitle">X Layer · 合约地址: 0x867fdd2eef548f80808d0c9065cd55f57e207777</div>

    <!-- 绑定地址卡片 -->
    <div class="card">
        <div class="card-header">
            <span class="emoji">🔗</span>
            <h2>绑定我的地址</h2>
        </div>
        <div class="input-group">
            <input type="text" id="bindAddress" class="address-input" placeholder="输入 0x 地址" value="0x3A4b8c9dEf4F56E7">
            <button id="bindBtn" class="btn-primary">📌 绑定并统计</button>
            <button id="clearBindBtn" class="btn-secondary">🗑️ 解绑</button>
        </div>
        <div id="boundStats" style="display: none;">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="dailyTotal">0</div>
                    <div class="stat-label">今日H交易量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dailyCount">0</div>
                    <div class="stat-label">今日交易笔数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalAll">0</div>
                    <div class="stat-label">累计H交易量</div>
                </div>
            </div>
            <p class="note" id="boundAddressDisplay">当前绑定: <span class="badge"></span>  (仅统计近24小时)</p>
        </div>
        <div id="noBound" style="padding: 20px; text-align: center; color: #94a3b8;">
            ⚡ 尚未绑定地址，请先输入地址并点击绑定
        </div>
    </div>

    <!-- 实时交易记录卡片 -->
    <div class="card">
        <div class="card-header">
            <span class="emoji">📡</span>
            <h2>实时交易记录 (最新100条)</h2>
            <span class="badge" id="refreshStatus">等待更新...</span>
        </div>
        <div class="table-wrapper" id="txTableWrapper">
            <table>
                <thead>
                    <tr>
                        <th>交易哈希</th>
                        <th>From</th>
                        <th>To</th>
                        <th>金额 (H)</th>
                        <th>区块</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="txList">
                    <tr><td colspan="6" style="text-align:center; padding:40px;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="note" style="display: flex; justify-content: space-between; align-items: center;">
            <span>⏱️ 自动每30秒刷新 · 仅显示近24小时交易</span>
            <button id="refreshNowBtn" class="btn-secondary" style="padding: 6px 16px;">🔄 立即刷新</button>
        </div>
    </div>

    <div class="footer">
        <p>© 社区H代币活动 · 数据基于X Layer公共RPC实时查询 · 客服微信: h_boost_audit</p>
    </div>
</div>

<script>
(function() {
    // --- 配置 ---
    const H_CONTRACT = '0x867fdd2eef548f80808d0c9065cd55f57e207777';
    // 备选RPC列表
    const RPC_LIST = [
        'https://rpc.xlayer.tech',
        'https://xlayerrpc.okx.com',
        'https://xlayer.drpc.org',
        'https://endpoints.omniatech.io/v1/xlayer/mainnet/public'
    ];
    // 默认decimals (可以从合约查询，但为简化先固定)
    const TOKEN_DECIMALS = 18;
    // 最大显示交易数
    const MAX_TXS = 100;
    // 刷新间隔（毫秒）
    const REFRESH_INTERVAL = 30000; // 30秒

    // --- 全局变量 ---
    let provider = null;
    let currentRpcIndex = 0;
    let refreshTimer = null;
    let isRefreshing = false;
    let boundAddress = localStorage.getItem('bound_address') || ''; // 从存储读取

    // UI元素
    const bindInput = document.getElementById('bindAddress');
    const bindBtn = document.getElementById('bindBtn');
    const clearBindBtn = document.getElementById('clearBindBtn');
    const boundStatsDiv = document.getElementById('boundStats');
    const noBoundDiv = document.getElementById('noBound');
    const boundAddressSpan = document.querySelector('#boundAddressDisplay .badge');
    const dailyTotalSpan = document.getElementById('dailyTotal');
    const dailyCountSpan = document.getElementById('dailyCount');
    const totalAllSpan = document.getElementById('totalAll');
    const txListTbody = document.getElementById('txList');
    const refreshStatus = document.getElementById('refreshStatus');
    const refreshNowBtn = document.getElementById('refreshNowBtn');

    // 存储交易数据 (用于统计)
    let allTxs = []; // 按时间倒序

    // --- 初始化provider (轮询RPC直到成功) ---
    async function initProvider() {
        for (let i = 0; i < RPC_LIST.length; i++) {
            try {
                const rpc = RPC_LIST[i];
                const testProvider = new ethers.providers.JsonRpcProvider(rpc);
                await testProvider.getBlockNumber(); // 测试连接
                provider = testProvider;
                currentRpcIndex = i;
                console.log('使用RPC:', rpc);
                return true;
            } catch (e) {
                console.warn('RPC失败:', RPC_LIST[i], e);
            }
        }
        alert('无法连接到X Layer网络，请稍后重试');
        return false;
    }

    // --- 工具函数：延迟 ---
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // --- 获取近24小时的区块范围 ---
    async function getRecentBlockRange() {
        try {
            const latestBlock = await provider.getBlock('latest');
            const latestNumber = latestBlock.number;
            // 假设平均3秒一个块，24小时 ≈ 28800块
            const blocksPerDay = 28800;
            const fromBlock = Math.max(latestNumber - blocksPerDay, 0);
            return { fromBlock, toBlock: latestNumber };
        } catch (e) {
            console.error('获取最新区块失败', e);
            return { fromBlock: 0, toBlock: 0 };
        }
    }

    // --- 查询H代币Transfer日志 ---
    async function fetchTransferLogs(fromBlock, toBlock) {
        const filter = {
            address: H_CONTRACT,
            topics: [ethers.utils.id('Transfer(address,address,uint256)')],
            fromBlock: ethers.utils.hexValue(fromBlock),
            toBlock: ethers.utils.hexValue(toBlock)
        };
        try {
            const logs = await provider.getLogs(filter);
            return logs;
        } catch (e) {
            console.error('getLogs失败', e);
            return [];
        }
    }

    // --- 解析日志为交易对象 ---
    function parseLogsToTxs(logs) {
        const txs = [];
        for (const log of logs) {
            try {
                const from = '0x' + log.topics[1].slice(26);
                const to = '0x' + log.topics[2].slice(26);
                const value = BigInt(log.data);
                const amount = Number(ethers.utils.formatUnits(value, TOKEN_DECIMALS));
                txs.push({
                    txHash: log.transactionHash,
                    from,
                    to,
                    amount,
                    blockNumber: parseInt(log.blockNumber, 16),
                    logIndex: parseInt(log.logIndex, 16),
                    timestamp: Date.now() // 暂缺实际时间，后续可用区块时间
                });
            } catch (e) {
                console.warn('解析日志失败', e);
            }
        }
        // 按区块号倒序（新区块在上）
        txs.sort((a, b) => b.blockNumber - a.blockNumber || b.logIndex - a.logIndex);
        return txs;
    }

    // --- 获取区块时间戳（可选，用于显示时间）---
    async function enrichTxsWithTimestamp(txs) {
        // 为节省RPC调用，只获取前20个区块的时间戳
        const blockNumbers = [...new Set(txs.slice(0, 20).map(tx => tx.blockNumber))];
        const blockTimes = {};
        await Promise.all(blockNumbers.map(async (bn) => {
            try {
                const block = await provider.getBlock(bn);
                blockTimes[bn] = block.timestamp * 1000;
            } catch (e) {}
        }));
        return txs.map(tx => ({
            ...tx,
            time: blockTimes[tx.blockNumber] ? new Date(blockTimes[tx.blockNumber]).toLocaleTimeString() : '--'
        }));
    }

    // --- 更新UI：交易列表 + 绑定地址统计 ---
    async function refreshData() {
        if (isRefreshing) return;
        isRefreshing = true;
        refreshStatus.innerHTML = '<span class="loading"></span> 刷新中...';

        try {
            const range = await getRecentBlockRange();
            if (range.toBlock === 0) throw new Error('获取区块范围失败');

            const logs = await fetchTransferLogs(range.fromBlock, range.toBlock);
            let txs = parseLogsToTxs(logs);
            // 截取最多MAX_TXS条
            txs = txs.slice(0, MAX_TXS);
            // 获取时间戳（可选）
            txs = await enrichTxsWithTimestamp(txs);
            allTxs = txs;

            // 渲染交易列表
            renderTxList(txs);

            // 如果有绑定地址，更新统计
            if (boundAddress) {
                updateBoundStats(txs);
            }

            refreshStatus.innerText = `最后更新: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            console.error(e);
            refreshStatus.innerText = '更新失败，尝试切换RPC';
            // 尝试切换RPC
            currentRpcIndex = (currentRpcIndex + 1) % RPC_LIST.length;
            provider = new ethers.providers.JsonRpcProvider(RPC_LIST[currentRpcIndex]);
        } finally {
            isRefreshing = false;
        }
    }

    // 渲染交易列表
    function renderTxList(txs) {
        if (txs.length === 0) {
            txListTbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">暂无交易记录</td></tr>';
            return;
        }
        let html = '';
        const boundLower = boundAddress.toLowerCase();
        txs.forEach(tx => {
            const isHighlight = (tx.from.toLowerCase() === boundLower || tx.to.toLowerCase() === boundLower);
            const rowClass = isHighlight ? 'highlight' : '';
            const shortHash = tx.txHash.slice(0, 10) + '...' + tx.txHash.slice(-8);
            const fromShort = tx.from.slice(0, 6) + '...' + tx.from.slice(-4);
            const toShort = tx.to.slice(0, 6) + '...' + tx.to.slice(-4);
            html += `<tr class="${rowClass}">
                <td class="tx-hash" title="${tx.txHash}">${shortHash}</td>
                <td class="address" title="${tx.from}">${fromShort}</td>
                <td class="address" title="${tx.to}">${toShort}</td>
                <td>${tx.amount.toFixed(4)}</td>
                <td>${tx.blockNumber}</td>
                <td>${tx.time || '--'}</td>
            </tr>`;
        });
        txListTbody.innerHTML = html;
    }

    // 更新绑定地址统计
    function updateBoundStats(txs) {
        const boundLower = boundAddress.toLowerCase();
        let dailyTotal = 0;
        let dailyCount = 0;
        // 累加所有涉及该地址的交易（无论买入卖出）
        txs.forEach(tx => {
            if (tx.from.toLowerCase() === boundLower || tx.to.toLowerCase() === boundLower) {
                dailyTotal += tx.amount;
                dailyCount++;
            }
        });
        // 累计总量（所有时间，但我们现在只有近24小时，所以先这样）
        // 也可以从localStorage累计，简化：就用近24小时作为累计
        dailyTotalSpan.innerText = dailyTotal.toFixed(2);
        dailyCountSpan.innerText = dailyCount;
        totalAllSpan.innerText = dailyTotal.toFixed(2); // 累计同近24小时，暂不区分

        boundAddressSpan.innerText = boundAddress.slice(0, 8) + '...' + boundAddress.slice(-6);
    }

    // --- 绑定地址处理 ---
    function bindAddress(addr) {
        if (!ethers.utils.isAddress(addr)) {
            alert('无效的以太坊地址');
            return false;
        }
        boundAddress = ethers.utils.getAddress(addr); // 校验和格式
        localStorage.setItem('bound_address', boundAddress);
        bindInput.value = boundAddress;

        // 显示统计区
        boundStatsDiv.style.display = 'block';
        noBoundDiv.style.display = 'none';
        boundAddressSpan.innerText = boundAddress.slice(0, 8) + '...' + boundAddress.slice(-6);

        // 立即刷新统计数据
        if (allTxs.length > 0) {
            updateBoundStats(allTxs);
        } else {
            // 如果没有数据，先刷新一次
            refreshData();
        }
        return true;
    }

    function unbindAddress() {
        boundAddress = '';
        localStorage.removeItem('bound_address');
        boundStatsDiv.style.display = 'none';
        noBoundDiv.style.display = 'block';
        bindInput.value = '';
        // 重新渲染列表，取消高亮
        renderTxList(allTxs);
    }

    // --- 初始化UI状态 ---
    async function init() {
        const ok = await initProvider();
        if (!ok) return;

        // 如果有已绑定的地址，恢复
        if (boundAddress) {
            bindInput.value = boundAddress;
            boundStatsDiv.style.display = 'block';
            noBoundDiv.style.display = 'none';
            boundAddressSpan.innerText = boundAddress.slice(0, 8) + '...' + boundAddress.slice(-6);
        }

        // 立即刷新数据
        await refreshData();

        // 设置定时刷新
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(refreshData, REFRESH_INTERVAL);
    }

    // --- 事件绑定 ---
    bindBtn.addEventListener('click', () => {
        bindAddress(bindInput.value.trim());
    });

    clearBindBtn.addEventListener('click', unbindAddress);

    refreshNowBtn.addEventListener('click', () => {
        refreshData();
    });

    // 启动
    init();

    // 页面卸载时清除定时器
    window.addEventListener('beforeunload', () => {
        if (refreshTimer) clearInterval(refreshTimer);
    });

})();
</script>
</body>
</html>
