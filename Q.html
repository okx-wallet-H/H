<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>海豚社区 · H代币实时交易排行榜</title>
    <!-- ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #f5f7fb;
            color: #1e293b;
            padding: 24px 20px 40px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .header-left .badge {
            background: rgba(124, 58, 237, 0.12);
            color: #6d28d9;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ddd6fe;
        }
        .network-status {
            background: white;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        }

        /* 卡片通用 */
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 15px 40px -15px rgba(124,58,237,0.15);
            border: 1px solid #f0e9ff;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header i {
            color: #7c3aed;
            background: #f5f3ff;
            padding: 8px;
            border-radius: 12px;
        }

        /* 搜索框 */
        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 3;
            min-width: 300px;
            padding: 16px 20px;
            border: 2px solid #e9e2f5;
            border-radius: 60px;
            font-size: 1rem;
        }
        .search-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px #ede9fe;
        }
        .btn-primary {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 8px 20px -8px #7c3aed;
        }
        .btn-primary:hover {
            background: #6d28d9;
        }
        .btn-outline {
            background: white;
            border: 2px solid #e9e2f5;
            color: #4b5563;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 网格布局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }
        .col-12 { grid-column: span 12; }

        /* 实时交易流 */
        .tx-stream {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid #f0e9ff;
        }
        .tx-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f5f0ff;
            font-size: 0.9rem;
        }
        .tx-row.highlight {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
        .tx-hash {
            width: 120px;
            font-family: monospace;
            color: #7c3aed;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-address {
            width: 150px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-amount {
            width: 100px;
            font-weight: 600;
            text-align: right;
        }
        .tx-type {
            width: 70px;
            text-align: center;
        }
        .type-badge {
            background: #e6f7e6;
            color: #0d9488;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* 排行榜 */
        .rank-list {
            margin-top: 16px;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e9ff;
        }
        .rank-num {
            width: 40px;
            font-weight: 700;
            color: #7c3aed;
        }
        .rank-addr {
            flex: 1;
            font-family: monospace;
        }
        .rank-vol {
            font-weight: 700;
        }

        /* 搜索结果卡片 */
        .search-result {
            background: #faf8ff;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #7c3aed;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.85rem;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
        }
        .badge {
            background: #ede9fe;
            color: #5b21b6;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <div class="header-left">
            <h1>🐬 海豚社区 · H代币实时交易排行榜</h1>
            <div class="badge">
                <span class="status-dot"></span> 自动统计前20名 · 无需审核
            </div>
        </div>
        <div class="network-status">
            <span><i class="fa-regular fa-database" style="color:#7c3aed;"></i> X Layer 链上实时数据</span>
            <span><i class="fa-regular fa-clock"></i> 最新区块: <span id="latestBlock">-</span></span>
            <span><i class="fa-regular fa-rotate"></i> <span id="updateTime">-</span></span>
        </div>
    </div>

    <!-- 搜索框 -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-regular fa-magnifying-glass"></i> 查询地址交易记录</h3>
        </div>
        <div class="search-row">
            <input type="text" id="searchAddress" class="search-input" placeholder="输入0x地址，例如 0x29018d...30Bd">
            <button id="searchBtn" class="btn-primary"><i class="fa-regular fa-search"></i> 查询</button>
            <button id="clearSearchBtn" class="btn-outline">清除</button>
        </div>
        <div id="searchResult" style="display: none;">
            <!-- 动态填充搜索结果 -->
        </div>
    </div>

    <!-- 实时交易流 + 排行榜 -->
    <div class="dashboard-grid">
        <!-- 实时交易流 -->
        <div class="card col-8">
            <div class="card-header">
                <h3><i class="fa-regular fa-rss"></i> 实时交易流 (最新50笔H转账)</h3>
                <span class="badge" id="txCount">0 笔</span>
            </div>
            <div class="tx-stream" id="txStream">
                <div style="text-align:center; padding:40px;">加载中...</div>
            </div>
        </div>

        <!-- 排行榜 -->
        <div class="card col-4">
            <div class="card-header">
                <h3><i class="fa-regular fa-ranking-star"></i> 累计交易量 TOP 20</h3>
                <span class="badge">实时更新</span>
            </div>
            <div class="rank-list" id="rankList">
                <div style="text-align:center; padding:20px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>© 海豚社区 · 数据基于X Layer公共RPC实时查询 · 仅统计买入/卖出交易（通过DEX合约过滤）</p>
        <p>H合约: 0x867fdd2eef548f80808d0c9065cd55f57e207777</p>
    </div>
</div>

<script>
(function() {
    // --- 配置 ---
    const H_CONTRACT = '0x867fdd2eef548f80808d0c9065cd55f57e207777';
    const RPC_URL = 'https://rpc.xlayer.tech';  // 公共RPC
    const TOKEN_DECIMALS = 18;
    const MAX_TXS = 50;          // 实时流显示条数
    const BLOCK_RANGE = 28800;    // 查询最近28800个区块（约24小时）

    // DEX合约列表 (用于判断交易，需补充X Layer上的实际DEX地址)
    const DEX_CONTRACTS = [
        '0xa38e5b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f', // 示例QuickSwap
        '0xb45e2b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f', // SyncSwap
        '0xc55e5b7c4b1b947c8b524f1c1e1c5b7b9f9f9f9f',
        // 请替换为真实DEX地址
    ].map(addr => addr.toLowerCase());

    // --- 全局状态 ---
    let provider = new ethers.providers.JsonRpcProvider(RPC_URL);
    let allTxs = [];               // 所有获取的交易 (已去重)
    let addressStats = new Map();   // 地址 -> 累计交易量
    let top20 = [];                // 前20地址
    let refreshTimer = null;
    let isLoading = false;

    // --- UI 元素 ---
    const latestBlockSpan = document.getElementById('latestBlock');
    const updateTimeSpan = document.getElementById('updateTime');
    const txCountSpan = document.getElementById('txCount');
    const txStreamDiv = document.getElementById('txStream');
    const rankListDiv = document.getElementById('rankList');
    const searchAddressInput = document.getElementById('searchAddress');
    const searchBtn = document.getElementById('searchBtn');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchResultDiv = document.getElementById('searchResult');

    // --- 工具函数 ---
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // --- 获取最新区块并更新UI ---
    async function updateLatestBlock() {
        try {
            const block = await provider.getBlockNumber();
            latestBlockSpan.innerText = block.toLocaleString();
        } catch (e) {}
    }

    // --- 获取最近BLOCK_RANGE个区块的Transfer日志 ---
    async function fetchRecentLogs() {
        try {
            const latest = await provider.getBlockNumber();
            const fromBlock = Math.max(latest - BLOCK_RANGE, 0);
            const filter = {
                address: H_CONTRACT,
                topics: [ethers.utils.id('Transfer(address,address,uint256)')],
                fromBlock: ethers.utils.hexValue(fromBlock),
                toBlock: ethers.utils.hexValue(latest)
            };
            const logs = await provider.getLogs(filter);
            return logs;
        } catch (e) {
            console.error('fetchLogs error', e);
            return [];
        }
    }

    // --- 解析日志，判断是否为交易（与DEX交互）---
    async function parseLogsToTxs(logs) {
        const txs = [];
        const batchSize = 10; // 批量处理收据查询
        for (let i = 0; i < logs.length; i += batchSize) {
            const batch = logs.slice(i, i + batchSize);
            await Promise.all(batch.map(async (log) => {
                try {
                    if (!log.topics || log.topics.length < 3) return;
                    const from = '0x' + log.topics[1].slice(26);
                    const to = '0x' + log.topics[2].slice(26);
                    const value = BigInt(log.data);
                    const amount = Number(ethers.utils.formatUnits(value, TOKEN_DECIMALS));
                    // 判断是否为交易：需要查询交易收据，检查to地址是否在DEX列表
                    // 注意：收据查询可能较慢，我们只针对每笔交易查询一次，并缓存结果
                    const receipt = await provider.getTransactionReceipt(log.transactionHash);
                    if (!receipt) return;
                    // 获取交易详情以确定to地址
                    const tx = await provider.getTransaction(log.transactionHash);
                    if (!tx) return;
                    const toAddr = tx.to ? tx.to.toLowerCase() : '';
                    const isSwap = DEX_CONTRACTS.includes(toAddr);
                    if (!isSwap) return; // 非交易不计入

                    txs.push({
                        txHash: log.transactionHash,
                        from, to,
                        amount,
                        blockNumber: parseInt(log.blockNumber, 16),
                        time: '--' // 稍后补充
                    });
                } catch (e) {
                    // 忽略解析错误
                }
            }));
            await sleep(100); // 避免请求过频
        }
        // 按区块降序
        txs.sort((a, b) => b.blockNumber - a.blockNumber);
        return txs;
    }

    // --- 获取区块时间戳并补充到交易 ---
    async function enrichTxsWithTime(txs) {
        const blocks = [...new Set(txs.slice(0, 20).map(t => t.blockNumber))];
        const times = {};
        await Promise.all(blocks.map(async (bn) => {
            try {
                const block = await provider.getBlock(bn);
                times[bn] = block.timestamp * 1000;
            } catch {}
        }));
        return txs.map(tx => ({
            ...tx,
            time: times[tx.blockNumber] ? new Date(times[tx.blockNumber]).toLocaleTimeString() : '--'
        }));
    }

    // --- 更新地址累计统计和排行榜 ---
    function updateStats(txs) {
        const stats = new Map();
        for (const tx of txs) {
            const from = tx.from.toLowerCase();
            const to = tx.to.toLowerCase();
            stats.set(from, (stats.get(from) || 0) + tx.amount);
            stats.set(to, (stats.get(to) || 0) + tx.amount);
        }
        addressStats = stats;
        // 计算前20
        top20 = Array.from(stats.entries())
            .map(([addr, vol]) => ({ addr, vol }))
            .sort((a, b) => b.vol - a.vol)
            .slice(0, 20);
    }

    // --- 渲染实时交易流 ---
    function renderTxStream(txs, highlightAddr) {
        if (txs.length === 0) {
            txStreamDiv.innerHTML = '<div style="text-align:center; padding:40px;">暂无交易</div>';
            return;
        }
        let html = '';
        const highlightLower = highlightAddr ? highlightAddr.toLowerCase() : null;
        txs.slice(0, MAX_TXS).forEach(tx => {
            const isHighlight = highlightLower && (tx.from.toLowerCase() === highlightLower || tx.to.toLowerCase() === highlightLower);
            const rowClass = isHighlight ? 'tx-row highlight' : 'tx-row';
            const shortHash = tx.txHash.slice(0, 10) + '…' + tx.txHash.slice(-6);
            const fromShort = tx.from.slice(0, 6) + '…' + tx.from.slice(-4);
            const toShort = tx.to.slice(0, 6) + '…' + tx.to.slice(-4);
            html += `<div class="${rowClass}">
                <span class="tx-hash" title="${tx.txHash}">${shortHash}</span>
                <span class="tx-address" title="${tx.from}">${fromShort}</span>
                <span class="tx-address" title="${tx.to}">→ ${toShort}</span>
                <span class="tx-amount">${tx.amount.toFixed(2)} H</span>
                <span class="tx-type"><span class="type-badge">交易</span></span>
                <span style="margin-left: auto; color:#94a3b8;">${tx.time}</span>
            </div>`;
        });
        txStreamDiv.innerHTML = html;
        txCountSpan.innerText = txs.length + ' 笔';
    }

    // --- 渲染排行榜 ---
    function renderRanking() {
        if (top20.length === 0) {
            rankListDiv.innerHTML = '<div style="text-align:center; padding:20px;">暂无数据</div>';
            return;
        }
        let html = '';
        top20.forEach((item, idx) => {
            const shortAddr = item.addr.slice(0, 6) + '…' + item.addr.slice(-4);
            html += `<div class="rank-item">
                <span class="rank-num">${idx+1}</span>
                <span class="rank-addr" title="${item.addr}">${shortAddr}</span>
                <span class="rank-vol">${item.vol.toFixed(2)} H</span>
            </div>`;
        });
        rankListDiv.innerHTML = html;
    }

    // --- 刷新所有数据 (核心) ---
    async function refreshData() {
        if (isLoading) return;
        isLoading = true;
        updateTimeSpan.innerHTML = '<i class="fa-regular fa-spinner fa-spin"></i> 更新中...';
        try {
            await updateLatestBlock();
            const logs = await fetchRecentLogs();
            const txs = await parseLogsToTxs(logs);
            const enriched = await enrichTxsWithTime(txs);
            allTxs = enriched;
            updateStats(enriched);
            renderTxStream(enriched, searchAddressInput.value.trim());
            renderRanking();
            updateTimeSpan.innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            updateTimeSpan.innerText = '更新失败';
        } finally {
            isLoading = false;
        }
    }

    // --- 搜索地址 ---
    function searchAddress(addr) {
        if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
            alert('请输入有效的0x地址');
            return;
        }
        const addrLower = addr.toLowerCase();
        // 过滤该地址的所有交易
        const addrTxs = allTxs.filter(tx => tx.from.toLowerCase() === addrLower || tx.to.toLowerCase() === addrLower);
        const totalVol = addrTxs.reduce((sum, tx) => sum + tx.amount, 0);
        // 查找排名
        const rank = Array.from(addressStats.entries())
            .sort((a, b) => b[1] - a[1])
            .findIndex(([a]) => a === addrLower) + 1;

        // 渲染搜索结果
        let txsHtml = '';
        addrTxs.slice(0, 20).forEach(tx => {
            const fromShort = tx.from.slice(0,6) + '…' + tx.from.slice(-4);
            const toShort = tx.to.slice(0,6) + '…' + tx.to.slice(-4);
            txsHtml += `<tr><td>${fromShort} → ${toShort}</td><td>${tx.amount.toFixed(2)} H</td><td>${tx.time}</td></tr>`;
        });

        searchResultDiv.innerHTML = `
            <div class="search-result">
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-value">${totalVol.toFixed(2)}</div>
                        <div class="stat-label">累计交易量 (H)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${addrTxs.length}</div>
                        <div class="stat-label">交易笔数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${rank > 0 ? '#'+rank : '未上榜'}</div>
                        <div class="stat-label">当前排名</div>
                    </div>
                </div>
                <h4 style="margin-bottom:12px;">交易记录 (最近20笔)</h4>
                <div style="max-height:300px; overflow-y:auto; border-radius:16px; border:1px solid #e9e2f5;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr><th>方向</th><th>数量</th><th>时间</th></tr></thead>
                        <tbody>${txsHtml || '<tr><td colspan="3" style="text-align:center;">无交易记录</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
        searchResultDiv.style.display = 'block';

        // 高亮实时流中该地址的交易
        renderTxStream(allTxs, addr);
    }

    function clearSearch() {
        searchAddressInput.value = '';
        searchResultDiv.style.display = 'none';
        renderTxStream(allTxs, null);
    }

    // --- 初始化与定时刷新 ---
    async function init() {
        await refreshData();
        refreshTimer = setInterval(refreshData, 60000); // 每分钟刷新一次
    }

    // --- 事件绑定 ---
    searchBtn.addEventListener('click', () => searchAddress(searchAddressInput.value.trim()));
    clearSearchBtn.addEventListener('click', clearSearch);

    init();

    window.addEventListener('beforeunload', () => {
        if (refreshTimer) clearInterval(refreshTimer);
    });
})();
</script>
</body>
</html>
