<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>X Layer USDT0 交易查询</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        input, button { padding: 0.5rem; font-size: 1rem; }
        input { width: 70%; }
        button { margin-left: 0.5rem; cursor: pointer; }
        pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; border-radius: 8px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>🔍 X Layer USDT0 交易记录查询</h2>
    <div>
        <input type="text" id="address" placeholder="输入 0x 地址" />
        <button onclick="queryTransactions()">查询</button>
    </div>
    <div id="result" style="margin-top: 1rem;">
        <pre>等待查询...</pre>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <script>
        // 配置
        const RPC_URL = 'https://shy-shy-surf.xlayer-mainnet.quiknode.pro/fa135d65d86e5cf4688019042067d4449f1235c5';
        const USDT0_ADDRESS = '0x779ded0c9e1022225f8e0630b35a9b54be713736';
        // Transfer 事件签名
        const TRANSFER_TOPIC = '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';

        const provider = new ethers.JsonRpcProvider(RPC_URL);
        // 合约接口，用于解码日志
        const iface = new ethers.Interface([
            'event Transfer(address indexed from, address indexed to, uint256 value)'
        ]);

        async function queryTransactions() {
            const address = document.getElementById('address').value.trim();
            if (!address || !ethers.isAddress(address)) {
                alert('请输入有效的以太坊地址');
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<pre>查询中（可能需等待几秒）...</pre>';

            try {
                // 获取当前区块高度，决定查询范围（最近 10000 个区块）
                const latestBlock = await provider.getBlockNumber();
                const fromBlock = Math.max(0, latestBlock - 10000);
                const toBlock = latestBlock;

                // 构造日志过滤条件
                const filter = {
                    address: USDT0_ADDRESS,
                    topics: [TRANSFER_TOPIC],
                    fromBlock: fromBlock,
                    toBlock: toBlock
                };

                const logs = await provider.getLogs(filter);
                const txs = [];

                for (const log of logs) {
                    const parsed = iface.parseLog(log);
                    if (!parsed) continue;
                    const { from, to, value } = parsed.args;
                    // 筛选与输入地址相关的转账（作为发送方或接收方）
                    if (from.toLowerCase() === address.toLowerCase() || to.toLowerCase() === address.toLowerCase()) {
                        txs.push({
                            hash: log.transactionHash,
                            block: log.blockNumber,
                            from,
                            to,
                            value: ethers.formatUnits(value, 18) // USDT0 是 18 位小数
                        });
                    }
                }

                // 显示结果
                if (txs.length === 0) {
                    resultDiv.innerHTML = `<pre>地址 ${address} 在最近 10000 个区块内没有 USDT0 转账记录。</pre>`;
                } else {
                    let output = `地址: ${address}\n区块范围: ${fromBlock} → ${toBlock}\n共找到 ${txs.length} 条记录\n\n`;
                    txs.forEach((tx, i) => {
                        output += `[${i+1}] 交易哈希: ${tx.hash}\n`;
                        output += `区块: ${tx.block}\n`;
                        output += `发送方: ${tx.from}\n`;
                        output += `接收方: ${tx.to}\n`;
                        output += `数量: ${tx.value} USDT0\n`;
                        output += '------------------------\n';
                    });
                    resultDiv.innerHTML = `<pre>${output}</pre>`;
                }
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<pre class="error">查询失败: ${err.message}</pre>`;
            }
        }
    </script>
</body>
</html>
