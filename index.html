<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Wallet Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #ffffff; 
            color: #1e293b; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; 
            -webkit-tap-highlight-color: transparent;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .token-card:active { background-color: #f8fafc; transform: scale(0.98); transition: 0.1s; }
        .nav-item.active { color: #8b5cf6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 拟物化卡片阴影 */
        .wallet-shadow {
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.15), 0 8px 10px -6px rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="flex justify-between items-center px-5 pt-4 pb-2 bg-white sticky top-0 z-10">
        <div class="flex items-center space-x-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200/50">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <select id="network-select" class="bg-transparent text-xs font-bold text-slate-700 outline-none appearance-none pr-4" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right center; background-size: 8px;">
                <option value="x-layer">X Layer</option>
                <option value="bnb">BNB Chain</option>
                <option value="solana">Solana</option>
            </select>
        </div>
        <div class="flex space-x-4">
            <button class="w-8 h-8 flex items-center justify-center text-slate-600"><i class="fa-solid fa-expand text-lg"></i></button>
            <button class="w-8 h-8 flex items-center justify-center text-slate-600"><i class="fa-solid fa-bell text-lg"></i></button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-5 pt-2 pb-24 hide-scrollbar">
        
        <section class="relative overflow-hidden bg-gradient-to-br from-purple-600 to-indigo-700 rounded-[2rem] p-6 mb-8 wallet-shadow text-white">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            
            <p class="text-purple-100/80 text-sm font-medium mb-1">总资产估值</p>
            <div class="flex items-baseline space-x-2">
                <h1 class="text-3xl font-bold tracking-tight">$12,450.88</h1>
                <i class="fa-solid fa-eye-slash text-white/50 text-xs"></i>
            </div>
            <div class="mt-4 flex items-center space-x-2">
                <span class="bg-white/20 px-2 py-0.5 rounded text-[10px] font-bold">今日 +$312.45</span>
                <span class="text-emerald-300 text-xs font-bold">+2.45%</span>
            </div>

            <div class="grid grid-cols-4 gap-2 mt-8">
                <button class="flex flex-col items-center space-y-1.5">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                        <i class="fa-solid fa-arrow-down-long text-sm"></i>
                    </div>
                    <span class="text-[11px] font-medium">接收</span>
                </button>
                <button class="flex flex-col items-center space-y-1.5">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                        <i class="fa-solid fa-arrow-up-long text-sm"></i>
                    </div>
                    <span class="text-[11px] font-medium">发送</span>
                </button>
                <button class="flex flex-col items-center space-y-1.5">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                        <i class="fa-solid fa-credit-card text-sm"></i>
                    </div>
                    <span class="text-[11px] font-medium">买币</span>
                </button>
                <button class="flex flex-col items-center space-y-1.5">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                        <i class="fa-solid fa-ellipsis text-sm"></i>
                    </div>
                    <span class="text-[11px] font-medium">更多</span>
                </button>
            </div>
        </section>

        <section>
            <div class="flex space-x-6 border-b border-slate-100 mb-4 sticky top-0 bg-white py-2 z-10">
                <button onclick="switchTab('tokens')" id="tab-tokens" class="pb-2 text-sm font-bold tab-active transition-all">代币</button>
                <button onclick="switchTab('nft')" id="tab-nft" class="pb-2 text-sm font-bold text-slate-400">NFTs</button>
                <button onclick="switchTab('defi')" id="tab-defi" class="pb-2 text-sm font-bold text-slate-400">DeFi</button>
            </div>

            <div id="content-tokens" class="space-y-1">
                <div class="token-card flex justify-between items-center py-4 px-2 rounded-2xl">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold text-sm">OKB</div>
                        <div>
                            <p class="font-bold text-slate-800">OKB</p>
                            <p class="text-[10px] text-slate-400 font-bold">$43.50 <span class="text-green-500">+1.2%</span></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800">120.50</p>
                        <p class="text-xs text-slate-500">$5,240.20</p>
                    </div>
                </div>

                <div class="token-card flex justify-between items-center py-4 px-2 rounded-2xl">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold italic text-sm">T</div>
                        <div>
                            <p class="font-bold text-slate-800">USDT</p>
                            <p class="text-[10px] text-slate-400 font-bold">$1.00 <span class="text-slate-400">0.0%</span></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800">7,210.68</p>
                        <p class="text-xs text-slate-500">$7,210.68</p>
                    </div>
                </div>
                
                <button class="w-full py-4 text-xs font-bold text-slate-400 flex items-center justify-center">
                    没有找到代币？<span class="text-purple-600 ml-1">导入代币</span>
                </button>
            </div>
        </section>

        <section class="mt-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-tight">热门行情</h3>
                <span class="text-xs text-purple-600 font-bold">查看全部</span>
            </div>
            <div class="flex space-x-3 overflow-x-auto hide-scrollbar">
                <div class="min-w-[110px] p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">BTC</p>
                    <p class="font-bold text-sm">$64,231</p>
                    <p class="text-[10px] font-bold text-green-500 mt-0.5">+1.2%</p>
                </div>
                <div class="min-w-[110px] p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">ETH</p>
                    <p class="font-bold text-sm">$3,452</p>
                    <p class="text-[10px] font-bold text-red-500 mt-0.5">-0.5%</p>
                </div>
                <div class="min-w-[110px] p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">SOL</p>
                    <p class="font-bold text-sm">$145.2</p>
                    <p class="text-[10px] font-bold text-green-500 mt-0.5">+5.8%</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 px-6 py-3 safe-bottom flex justify-between items-center z-20">
        <div class="nav-item active flex flex-col items-center space-y-1">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">钱包</span>
        </div>
        <div class="nav-item flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-arrow-right-arrow-left text-xl"></i>
            <span class="text-[10px] font-bold">交换</span>
        </div>
        <div class="nav-item flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">行情</span>
        </div>
        <div class="nav-item flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-bold">发现</span>
        </div>
        <div class="nav-item flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[10px] font-bold">设置</span>
        </div>
    </nav>

    <script>
        function switchTab(tab) {
            const tabs = ['tokens', 'nft', 'defi'];
            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if(t === tab) {
                    el.classList.add('tab-active', 'text-purple-600');
                    el.classList.remove('text-slate-400');
                } else {
                    el.classList.remove('tab-active', 'text-purple-600');
                    el.classList.add('text-slate-400');
                }
            });
            // 这里可以添加内容切换逻辑
        }
    </script>
</body>
</html>
