<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Wallet - Core Design System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        /* 优先使用 Inter，遇到中文会自动降级回系统原生黑体 */
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* 3. 锁定全局核心变量，绝不随意更改 */
        :root {
            --brand-primary: #8b5cf6;     /* 核心紫 Tailwind purple-500 */
            --brand-dark: #6d28d9;        /* 按钮按下时的深紫 */
            --brand-light: #f5f3ff;       /* 极浅的紫底色 */
            
            --bg-app: #f8fafc;            /* App 底色 Slate 50 */
            --bg-card: #ffffff;           /* 卡片底色 纯白 */
            
            --text-main: #0f172a;         /* 主标题黑 Slate 900 */
            --text-sub: #64748b;          /* 副标题灰 Slate 500 */
            --text-muted: #94a3b8;        /* 弱提示灰 Slate 400 */
            
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.02);
            --radius-card: 1.5rem;        /* 统一 24px 圆角 */
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            -webkit-tap-highlight-color: transparent;
            /* 保证底部导航不被刘海屏条遮挡 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 4. 锁定通用组件样式 */
        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(241, 245, 249, 0.8);
        }
        
        .btn-primary {
            background-color: var(--brand-primary);
            color: white;
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            background-color: var(--brand-dark);
            transform: scale(0.98);
        }

        .icon-box {
            background-color: var(--brand-light);
            color: var(--brand-primary);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 页面切换逻辑 */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.15s ease-out; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-hidden">

    <div id="page-home" class="page active">
        <header class="flex justify-between items-center px-5 pt-4 pb-2 bg-[var(--bg-app)] sticky top-0 z-10">
            <div class="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <select id="network-select" class="bg-transparent text-xs font-semibold text-[var(--text-main)] outline-none appearance-none pr-2 cursor-pointer">
                    <option value="all" selected>全部网络</option>
                    <option value="x-layer">X Layer</option>
                    <option value="bnb">BNB Chain</option>
                </select>
                <i class="fa-solid fa-angle-down text-[10px] text-[var(--text-muted)]"></i>
            </div>
            <div class="flex space-x-4 text-[var(--text-sub)]">
                <i class="fa-solid fa-qrcode text-lg"></i>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-5 pt-4 pb-24 hide-scrollbar">
            <section class="text-center mb-8">
                <p class="text-[var(--text-sub)] text-xs font-medium mb-1">总资产 (USD)</p>
                <h1 class="text-4xl font-extrabold tracking-tight text-[var(--text-main)]">$12,450.88</h1>
                <div class="inline-flex items-center mt-2 px-2 py-0.5 bg-green-50 rounded-md">
                    <span class="text-green-600 text-[10px] font-bold">+2.45%</span>
                </div>
            </section>

            <nav class="grid grid-cols-4 gap-4 mb-8">
                <div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
                    <div class="w-12 h-12 icon-box rounded-2xl flex items-center justify-center text-lg">
                        <i class="fa-solid fa-arrow-down"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-[var(--text-main)]">充币</span>
                </div>
                <div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
                    <div class="w-12 h-12 icon-box rounded-2xl flex items-center justify-center text-lg">
                        <i class="fa-solid fa-arrow-up"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-[var(--text-main)]">提币</span>
                </div>
                <div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
                    <div class="w-12 h-12 icon-box rounded-2xl flex items-center justify-center text-lg">
                        <i class="fa-solid fa-repeat"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-[var(--text-main)]">交易</span>
                </div>
                <div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
                    <div class="w-12 h-12 bg-white border border-slate-100 rounded-2xl flex items-center justify-center text-[var(--text-sub)] text-lg shadow-sm">
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-[var(--text-main)]">更多</span>
                </div>
            </nav>

            <div class="card p-2 mb-6">
                <div class="flex justify-between items-center p-3 hover:bg-slate-50 rounded-xl transition-colors cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-[#8b5cf6] rounded-full flex items-center justify-center text-white font-bold text-xs shadow-md shadow-purple-200">OKB</div>
                        <div>
                            <p class="font-bold text-sm text-[var(--text-main)]">OKB</p>
                            <p class="text-[10px] text-[var(--text-muted)] font-medium">X Layer</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm text-[var(--text-main)]">120.50</p>
                        <p class="text-[10px] text-[var(--text-sub)] font-medium">$5,240.20</p>
                    </div>
                </div>

                <div class="flex justify-between items-center p-3 hover:bg-slate-50 rounded-xl transition-colors cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-[#10b981] rounded-full flex items-center justify-center text-white font-bold italic text-xs shadow-md shadow-emerald-200">T</div>
                        <div>
                            <p class="font-bold text-sm text-[var(--text-main)]">USDT</p>
                            <p class="text-[10px] text-[var(--text-muted)] font-medium">Tether USD</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm text-[var(--text-main)]">7,210.68</p>
                        <p class="text-[10px] text-[var(--text-sub)] font-medium">$7,210.68</p>
                    </div>
                </div>
            </div>
            
            <button class="w-full py-4 rounded-2xl font-bold text-sm btn-primary shadow-lg shadow-purple-200">
                管理代币列表
            </button>
        </main>
    </div>

</body>
</html>
