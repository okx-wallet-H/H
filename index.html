<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Wallet - Pro Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; color: #1e293b; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .page { display: none; min-height: 100vh; animation: slideIn 0.2s ease-out; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .glass-input { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 1rem; width: 100%; padding: 1rem; outline: none; transition: all 0.2s; }
        .glass-input:focus { border-color: #8b5cf6; background: #fff; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="page-home" class="page active">
        <header class="flex justify-between items-center px-5 pt-4 pb-2 bg-white sticky top-0 z-10">
            <div class="flex items-center space-x-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200/50">
                <i class="fa-solid fa-layer-group text-[10px] text-purple-600"></i>
                <select id="network-select" class="bg-transparent text-xs font-bold text-slate-700 outline-none">
                    <option value="all" selected>全部网络</option>
                    <option value="x-layer">X Layer</option>
                    <option value="bnb">BNB Chain</option>
                    <option value="solana">Solana</option>
                </select>
            </div>
            <div class="flex space-x-4 text-slate-600">
                <i class="fa-solid fa-expand text-lg"></i>
                <i class="fa-solid fa-bell text-lg"></i>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-5 pt-2 pb-24 hide-scrollbar">
            <section class="bg-gradient-to-br from-purple-600 to-indigo-700 rounded-[2rem] p-6 mb-8 text-white shadow-xl shadow-purple-200">
                <p class="text-purple-100/80 text-sm font-medium mb-1">总资产估值</p>
                <h1 class="text-3xl font-bold tracking-tight">$12,450.88</h1>
                
                <div class="grid grid-cols-3 gap-2 mt-8">
                    <button onclick="navigateTo('page-deposit')" class="flex flex-col items-center space-y-1.5 py-2">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                            <i class="fa-solid fa-arrow-down-long"></i>
                        </div>
                        <span class="text-[11px] font-medium">充币</span>
                    </button>
                    <button onclick="navigateTo('page-withdraw')" class="flex flex-col items-center space-y-1.5 py-2">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                            <i class="fa-solid fa-arrow-up-long"></i>
                        </div>
                        <span class="text-[11px] font-medium">提币</span>
                    </button>
                    <button onclick="navigateTo('page-swap')" class="flex flex-col items-center space-y-1.5 py-2">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
                            <i class="fa-solid fa-repeat"></i>
                        </div>
                        <span class="text-[11px] font-medium">交易</span>
                    </button>
                </div>
            </section>

            <h3 class="text-sm font-bold text-slate-800 mb-4 px-2">资产列表</h3>
            <div class="space-y-1">
                <div class="flex justify-between items-center py-4 px-2 active:bg-slate-50 rounded-2xl transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold text-xs shadow-md shadow-purple-100">OKB</div>
                            <div class="absolute -right-1 -bottom-1 w-4 h-4 bg-white border border-slate-100 rounded-full flex items-center justify-center text-[8px] text-purple-600">X</div>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">OKB</p>
                            <p class="text-[10px] text-slate-400 font-bold">X Layer</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800 text-sm">120.50</p>
                        <p class="text-[10px] text-slate-400 font-bold">$5,240.20</p>
                    </div>
                </div>
                <div class="flex justify-between items-center py-4 px-2 active:bg-slate-50 rounded-2xl transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-white font-bold text-xs shadow-md shadow-yellow-100">BNB</div>
                            <div class="absolute -right-1 -bottom-1 w-4 h-4 bg-white border border-slate-100 rounded-full flex items-center justify-center text-[8px] text-yellow-600">B</div>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">BNB</p>
                            <p class="text-[10px] text-slate-400 font-bold">BNB Chain</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800 text-sm">2.45</p>
                        <p class="text-[10px] text-slate-400 font-bold">$1,470.00</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="page-deposit" class="page">
        <header class="p-5 flex items-center">
            <button onclick="navigateTo('page-home')" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mr-4">
                <i class="fa-solid fa-chevron-left text-slate-600"></i>
            </button>
            <h2 class="text-lg font-bold">选择充币网络</h2>
        </header>
        <main class="flex-1 px-5 text-center">
            <div class="bg-slate-50 rounded-3xl p-8 mb-6">
                <div class="w-48 h-48 bg-white mx-auto mb-6 flex items-center justify-center border-2 border-slate-100 rounded-2xl">
                    <i class="fa-solid fa-qrcode text-8xl text-slate-200"></i>
                </div>
                <p class="text-xs text-slate-400 mb-2">您的 X Layer 地址</p>
                <div class="flex items-center justify-center bg-white p-3 rounded-xl border border-slate-200 mb-4">
                    <span class="text-xs font-mono text-slate-600 truncate">0x71C...8eA3</span>
                    <i class="fa-solid fa-copy ml-3 text-purple-600"></i>
                </div>
            </div>
            <p class="text-xs text-red-400 font-medium px-4">请务必确保您在充值时选择的是 X Layer 网络，否则资产可能会丢失。</p>
        </main>
    </div>

    <div id="page-withdraw" class="page">
        <header class="p-5 flex items-center">
            <button onclick="navigateTo('page-home')" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mr-4">
                <i class="fa-solid fa-chevron-left text-slate-600"></i>
            </button>
            <h2 class="text-lg font-bold">发送代币</h2>
        </header>
        <main class="flex-1 px-5 space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-400 ml-2 mb-2 block uppercase">接收地址</label>
                <input type="text" placeholder="输入或粘贴地址" class="glass-input">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 ml-2 mb-2 block uppercase">发送金额</label>
                <div class="relative">
                    <input type="number" placeholder="0.00" class="glass-input pr-16">
                    <span class="absolute right-4 top-4 font-bold text-purple-600">MAX</span>
                </div>
                <p class="text-[10px] text-slate-400 mt-2 ml-2">可用余额: 120.50 OKB</p>
            </div>
            <button class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-100 mt-8">下一步</button>
        </main>
    </div>

    <div id="page-swap" class="page">
        <header class="p-5 flex items-center justify-between">
            <button onclick="navigateTo('page-home')" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center">
                <i class="fa-solid fa-chevron-left text-slate-600"></i>
            </button>
            <h2 class="text-lg font-bold">闪兑</h2>
            <i class="fa-solid fa-sliders text-slate-600"></i>
        </header>
        <main class="flex-1 px-5">
            <div class="space-y-2 relative">
                <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-slate-400">从</span>
                        <span class="text-xs text-slate-400">余额: 120.50</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <input type="number" value="100" class="bg-transparent text-2xl font-bold outline-none w-1/2">
                        <div class="flex items-center bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
                            <span class="font-bold text-sm mr-2">OKB</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </div>
                    </div>
                </div>

                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white border-4 border-white shadow-md rounded-full flex items-center justify-center z-10">
                    <i class="fa-solid fa-arrow-down-up-lock text-purple-600 text-sm"></i>
                </div>

                <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-slate-400">至</span>
                        <span class="text-xs text-slate-400">余额: 7,210.68</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <input type="number" placeholder="4350.2" class="bg-transparent text-2xl font-bold outline-none w-1/2">
                        <div class="flex items-center bg-emerald-500 text-white px-3 py-1.5 rounded-full shadow-sm">
                            <span class="font-bold text-sm mr-2">USDT</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 p-4 bg-purple-50 rounded-2xl">
                <div class="flex justify-between text-xs mb-2">
                    <span class="text-slate-500">汇率</span>
                    <span class="font-medium text-slate-700">1 OKB ≈ 43.5 USDT</span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-slate-500">网络费用</span>
                    <span class="font-medium text-slate-700">~$0.24</span>
                </div>
            </div>

            <button class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-100 mt-8">确认兑换</button>
        </main>
    </div>

    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 py-3 safe-bottom flex justify-between items-center z-20">
        <div class="flex flex-col items-center space-y-1 text-purple-600">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">钱包</span>
        </div>
        <div class="flex flex-col items-center space-y-1 text-slate-300">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">行情</span>
        </div>
        <div class="flex flex-col items-center space-y-1 text-slate-300">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-bold">发现</span>
        </div>
        <div class="flex flex-col items-center space-y-1 text-slate-300">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[10px] font-bold">设置</span>
        </div>
    </nav>

    <script>
        // 简单的页面导航逻辑
        function navigateTo(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            
            // 如果不是首页，隐藏底部导航栏以增加沉浸感
            const bottomNav = document.getElementById('bottom-nav');
            if(pageId === 'page-home') {
                bottomNav.style.display = 'flex';
            } else {
                bottomNav.style.display = 'none';
            }
        }

        // 模拟网络切换
        document.getElementById('network-select').addEventListener('change', (e) => {
            console.log("切换到网络:", e.target.value);
            // 这里可以添加根据网络过滤代币的逻辑
        });
    </script>
</body>
</html>
