<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haitun Wallet | 海豚 Web3 钱包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dolphin-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #2dd4bf 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full dolphin-gradient shadow-lg shadow-cyan-500/20 mb-4">
                <i data-lucide="waves" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Haitun <span class="text-cyan-400">Wallet</span></h1>
            <p class="text-slate-400 mt-2">安全、简洁的去中心化资产管理</p>
        </div>

        <div class="glass-card rounded-3xl p-6 shadow-2xl">
            <div id="loggedOutView" class="space-y-6">
                <div class="text-center py-6">
                    <p class="text-slate-300">连接你的钱包以查看余额和交易</p>
                </div>
                <button onclick="connectWallet()" id="connectBtn" class="w-full dolphin-gradient hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    连接 MetaMask
                </button>
            </div>

            <div id="loggedInView" class="hidden space-y-6">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-slate-400">当前网络: <span class="text-emerald-400">Ethereum Mainnet</span></span>
                    <button onclick="disconnect()" class="text-xs text-slate-500 hover:text-red-400 transition-colors">断开连接</button>
                </div>

                <div class="bg-white/5 rounded-2xl p-6 text-center border border-white/5">
                    <p class="text-slate-400 text-sm mb-1">总余额</p>
                    <h2 id="ethBalance" class="text-4xl font-extrabold tracking-tighter text-white">0.00 <span class="text-lg font-normal text-slate-400 ml-1">ETH</span></h2>
                </div>

                <div class="space-y-3">
                    <div class="flex items-center justify-between px-2 text-sm text-slate-400">
                        <span>钱包地址</span>
                        <span id="walletAddressShort" class="font-mono text-cyan-400">0x00...000</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                            <i data-lucide="arrow-up-right" class="w-4 h-4"></i> 发送
                        </button>
                        <button class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                            <i data-lucide="arrow-down-left" class="w-4 h-4"></i> 接收
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-500 italic">© 2026 Haitun Wallet. Powered by Ethereum.</p>
        </div>
    </div>

    <script>
        // 初始化图标
        lucide.createIcons();

        let userAddress = "";

        // 核心连接逻辑
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            
            if (typeof window.ethereum !== 'undefined') {
                try {
                    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 连接中...';
                    lucide.createIcons();

                    // 请求账户
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    
                    await updateUI();
                } catch (error) {
                    console.error(error);
                    alert("连接取消或出错");
                    resetBtn();
                }
            } else {
                alert("未检测到钱包！请安装 MetaMask 插件。");
            }
        }

        async function updateUI() {
            // 切换视图
            document.getElementById('loggedOutView').classList.add('hidden');
            document.getElementById('loggedInView').classList.remove('hidden');

            // 格式化地址 (0x1234...5678)
            const shortAddr = userAddress.substring(0, 6) + "..." + userAddress.substring(userAddress.length - 4);
            document.getElementById('walletAddressShort').innerText = shortAddr;

            // 获取余额
            const hexBalance = await window.ethereum.request({
                method: 'eth_getBalance',
                params: [userAddress, 'latest']
            });
            const ethBalance = (parseInt(hexBalance, 16) / 1e18).toFixed(4);
            document.getElementById('ethBalance').innerHTML = `${ethBalance} <span class="text-lg font-normal text-slate-400 ml-1">ETH</span>`;
        }

        function disconnect() {
            // Web3 无法真正从前端强行断开连接，只能刷新页面模拟断开
            location.reload();
        }

        function resetBtn() {
            const btn = document.getElementById('connectBtn');
            btn.innerHTML = '<i data-lucide="wallet" class="w-5 h-5"></i> 连接 MetaMask';
            lucide.createIcons();
        }

        // 监听账户切换
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    userAddress = accounts[0];
                    updateUI();
                } else {
                    location.reload();
                }
            });
        }
    </script>
</body>
</html>
