<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查询系统</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #19191f;
      --sub: #6f7285;
      --line: #ececf4;
      --purple: #7c3aed;
      --purple-2: #a855f7;
      --gold: #c89b3c;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 10px 30px rgba(20, 20, 30, 0.06);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(168,85,247,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(200,155,60,.10), transparent 25%),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(1200px, calc(100vw - 32px));
      margin: 28px auto 40px;
    }

    .hero {
      padding: 22px 24px;
      border: 1px solid rgba(124,58,237,.12);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .title .grad {
      background: linear-gradient(90deg, var(--purple), var(--purple-2), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .desc {
      margin: 10px 0 0;
      color: var(--sub);
      line-height: 1.7;
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px 0;
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto auto;
      gap: 12px;
    }

    .toolbar-2 {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 13px;
      color: var(--sub);
      font-weight: 600;
    }

    input, select {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid #dfdfee;
      background: #fff;
      outline: none;
      padding: 0 14px;
      font-size: 14px;
      color: var(--text);
      transition: .2s ease;
    }

    input:focus, select:focus {
      border-color: rgba(124,58,237,.45);
      box-shadow: 0 0 0 4px rgba(124,58,237,.08);
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--purple-2));
      box-shadow: 0 8px 24px rgba(124,58,237,.25);
    }

    .btn-primary:hover { transform: translateY(-1px); }

    .btn-ghost {
      color: var(--text);
      background: #fff;
      border: 1px solid #e4e4ef;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 18px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff, #fcfcff);
      border: 1px solid #efeff7;
    }

    .stat .k {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat .v {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      word-break: break-all;
    }

    .income { color: var(--success); }
    .expense { color: var(--danger); }
    .net {
      background: linear-gradient(90deg, var(--purple), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--sub);
      font-size: 13px;
    }

    .meta span {
      padding: 8px 10px;
      background: #fafafe;
      border: 1px solid #efeff7;
      border-radius: 999px;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
    }

    .status.show { display: block; }
    .status.info {
      background: rgba(124,58,237,.08);
      color: #5b21b6;
      border: 1px solid rgba(124,58,237,.14);
    }
    .status.error {
      background: rgba(220,38,38,.08);
      color: #991b1b;
      border: 1px solid rgba(220,38,38,.14);
    }
    .status.success {
      background: rgba(22,163,74,.08);
      color: #166534;
      border: 1px solid rgba(22,163,74,.14);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid #efeff7;
      border-radius: 16px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #fbfbff;
      color: #55586b;
      font-size: 13px;
      text-align: left;
      padding: 14px 14px;
      border-bottom: 1px solid #ededf6;
    }

    tbody td {
      padding: 14px 14px;
      border-bottom: 1px solid #f2f2f8;
      font-size: 13px;
      vertical-align: top;
    }

    tbody tr:hover { background: #fcfcff; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.in {
      background: rgba(22,163,74,.10);
      color: #166534;
    }

    .badge.out {
      background: rgba(220,38,38,.10);
      color: #991b1b;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
    }

    .link {
      color: var(--purple);
      text-decoration: none;
      font-weight: 700;
    }

    .muted {
      color: var(--sub);
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr; }
      .toolbar-2 { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .wrap { width: min(100vw - 20px, 1200px); margin: 10px auto 24px; }
      .hero { padding: 18px; }
      .title { font-size: 26px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 class="title"><span class="grad">查询系统</span></h1>
      <p class="desc">
        X Layer 主网 USDT 历史转账查询工具。输入钱包地址后，可统计收入总额、支出总额、净收入，并展示全部历史明细。
      </p>
    </section>

    <section class="card">
      <div class="card-head">
        <h2 class="card-title">查询条件</h2>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <div class="field">
            <label class="label">钱包地址</label>
            <input id="address" placeholder="输入 0x 开头的钱包地址" />
          </div>

          <div class="field">
            <label class="label">查询模式</label>
            <select id="mode">
              <option value="backend">优先走后端 API</option>
              <option value="rpc">直连 RPC（可能被浏览器拦截）</option>
            </select>
          </div>

          <div class="field">
            <label class="label">后端 API 地址</label>
            <input id="apiBase" placeholder="https://brydhwbiypnnktuwawpq.supabase.co/functions/v1/transactions?" />
          </div>

          <div class="field">
            <label class="label">起始区块</label>
            <input id="startBlock" placeholder="留空默认从 0 开始" value="0" />
          </div>

          <div style="display:flex;align-items:flex-end;gap:10px;">
            <button class="btn-primary" id="queryBtn">开始查询</button>
            <button class="btn-ghost" id="clearBtn">清空</button>
          </div>
        </div>

        <div class="toolbar-2">
          <div class="field">
            <label class="label">RPC 地址</label>
            <input id="rpcUrl" value="https://shy-shy-surf.xlayer-mainnet.quiknode.pro/fa135d65d86e5cf4688019042067d4449f1235c5" />
          </div>
          <div class="field">
            <label class="label">USDT 合约</label>
            <input id="tokenAddress" value="0x779ded0c9e1022225f8e0630b35a9b54be713736" />
          </div>
          <div class="field">
            <label class="label">Chain ID</label>
            <input id="chainId" value="196" />
          </div>
          <div class="field">
            <label class="label">分段区块数</label>
            <input id="step" value="5000" />
          </div>
        </div>

        <div class="meta">
          <span>网络：X Layer Mainnet</span>
          <span>默认 Token：USDT</span>
          <span>统计范围：全部历史</span>
          <span>主网 Chain ID：196</span>
        </div>

        <div id="status" class="status info"></div>
      </div>
    </section>

    <section class="card" style="margin-top:16px;">
      <div class="card-head">
        <h2 class="card-title">统计结果</h2>
      </div>
      <div class="card-body">
        <div class="stats">
          <div class="stat">
            <div class="k">收入总额</div>
            <div class="v income" id="incomeTotal">0</div>
          </div>
          <div class="stat">
            <div class="k">支出总额</div>
            <div class="v expense" id="expenseTotal">0</div>
          </div>
          <div class="stat">
            <div class="k">净收入</div>
            <div class="v net" id="netIncome">0</div>
          </div>
          <div class="stat">
            <div class="k">收入笔数</div>
            <div class="v" id="incomeCount">0</div>
          </div>
          <div class="stat">
            <div class="k">支出笔数</div>
            <div class="v" id="expenseCount">0</div>
          </div>
        </div>

        <div class="meta" style="margin-top:14px;">
          <span id="tokenMeta">Token：-</span>
          <span id="recordCount">记录数：0</span>
          <span id="queryAddress">地址：-</span>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:16px;">
      <div class="card-head">
        <h2 class="card-title">历史明细</h2>
        <button class="btn-ghost" id="exportBtn">导出 CSV</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>方向</th>
                <th>金额</th>
                <th>From</th>
                <th>To</th>
                <th>交易哈希</th>
                <th>区块</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr>
                <td colspan="7" class="muted">暂无数据，请输入地址后查询。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const TRANSFER_TOPIC = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef";
    const TOKEN_META_ABI = {
      decimals: "0x313ce567",
      symbol: "0x95d89b41",
      name: "0x06fdde03"
    };

    let lastRows = [];

    const $ = (id) => document.getElementById(id);

    function setStatus(text, type = "info") {
      const el = $("status");
      el.className = `status show ${type}`;
      el.textContent = text;
    }

    function clearStatus() {
      const el = $("status");
      el.className = "status info";
      el.textContent = "";
      el.style.display = "none";
    }

    function showStatus(text, type = "info") {
      const el = $("status");
      el.style.display = "block";
      setStatus(text, type);
    }

    function isAddress(addr) {
      return /^0x[a-fA-F0-9]{40}$/.test(addr || "");
    }

    function padTopicAddress(address) {
      return "0x" + "0".repeat(24) + address.toLowerCase().replace(/^0x/, "");
    }

    function toHex(n) {
      return "0x" + BigInt(n).toString(16);
    }

    function hexToBigInt(hex) {
      return BigInt(hex);
    }

    function shorten(v, left = 8, right = 6) {
      if (!v || v.length <= left + right + 3) return v || "-";
      return `${v.slice(0, left)}...${v.slice(-right)}`;
    }

    function formatUnits(valueBigInt, decimals) {
      const negative = valueBigInt < 0n;
      const value = negative ? -valueBigInt : valueBigInt;
      const base = 10n ** BigInt(decimals);
      const integer = value / base;
      let fraction = (value % base).toString().padStart(decimals, "0");
      fraction = fraction.replace(/0+$/, "");
      const out = fraction ? `${integer.toString()}.${fraction}` : integer.toString();
      return negative ? `-${out}` : out;
    }

    function formatDisplay(valueStr) {
      const n = Number(valueStr);
      if (Number.isNaN(n)) return valueStr;
      return n.toLocaleString("zh-CN", { maximumFractionDigits: 6 });
    }

    function tsToString(ts) {
      if (!ts) return "-";
      const d = new Date(ts * 1000);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    async function rpcCall(url, method, params) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jsonrpc: "2.0",
          id: Date.now(),
          method,
          params
        })
      });

      if (!res.ok) {
        throw new Error(`RPC HTTP 错误：${res.status}`);
      }

      const json = await res.json();
      if (json.error) {
        throw new Error(json.error.message || "RPC 返回错误");
      }
      return json.result;
    }

    async function readDecimals(rpcUrl, tokenAddress) {
      const result = await rpcCall(rpcUrl, "eth_call", [{
        to: tokenAddress,
        data: TOKEN_META_ABI.decimals
      }, "latest"]);
      return Number(BigInt(result));
    }

    async function readStringCall(rpcUrl, tokenAddress, data) {
      const result = await rpcCall(rpcUrl, "eth_call", [{
        to: tokenAddress,
        data
      }, "latest"]);

      if (!result || result === "0x") return "";
      const hex = result.replace(/^0x/, "");

      try {
        if (hex.length >= 128) {
          const lenHex = hex.slice(64, 128);
          const len = Number(BigInt("0x" + lenHex));
          const dataHex = hex.slice(128, 128 + len * 2);
          let out = "";
          for (let i = 0; i < dataHex.length; i += 2) {
            const code = parseInt(dataHex.slice(i, i + 2), 16);
            if (code) out += String.fromCharCode(code);
          }
          return out;
        }
      } catch (_) {}
      return "";
    }

    async function getTokenMeta(rpcUrl, tokenAddress) {
      const [decimals, symbol, name] = await Promise.all([
        readDecimals(rpcUrl, tokenAddress),
        readStringCall(rpcUrl, tokenAddress, TOKEN_META_ABI.symbol).catch(() => "USDT"),
        readStringCall(rpcUrl, tokenAddress, TOKEN_META_ABI.name).catch(() => "Tether USD")
      ]);
      return { decimals, symbol: symbol || "USDT", name: name || "Tether USD" };
    }

    async function getLatestBlock(rpcUrl) {
      const hex = await rpcCall(rpcUrl, "eth_blockNumber", []);
      return Number(BigInt(hex));
    }

    async function getLogsRange(rpcUrl, tokenAddress, fromBlock, toBlock, topic1 = null, topic2 = null) {
      const topics = [TRANSFER_TOPIC, topic1, topic2];
      return await rpcCall(rpcUrl, "eth_getLogs", [{
        address: tokenAddress,
        fromBlock: toHex(fromBlock),
        toBlock: toHex(toBlock),
        topics
      }]);
    }

    function parseLog(log, addressLower) {
      const from = "0x" + log.topics[1].slice(26).toLowerCase();
      const to = "0x" + log.topics[2].slice(26).toLowerCase();
      const value = hexToBigInt(log.data);
      let direction = "";
      if (to === addressLower && from !== addressLower) direction = "in";
      if (from === addressLower && to !== addressLower) direction = "out";
      if (!direction) return null;

      return {
        txHash: log.transactionHash,
        blockNumber: Number(BigInt(log.blockNumber)),
        logIndex: Number(BigInt(log.logIndex)),
        from,
        to,
        value,
        direction
      };
    }

    async function queryByRpc({ address, rpcUrl, tokenAddress, startBlock, step }) {
      const addressLower = address.toLowerCase();
      const addressTopic = padTopicAddress(addressLower);
      const latest = await getLatestBlock(rpcUrl);
      const meta = await getTokenMeta(rpcUrl, tokenAddress);

      const incomeLogs = [];
      const expenseLogs = [];

      for (let from = startBlock; from <= latest; from += step) {
        const to = Math.min(from + step - 1, latest);
        showStatus(`正在扫描区块 ${from} - ${to} / 最新 ${latest} ...`, "info");

        const [ins, outs] = await Promise.all([
          getLogsRange(rpcUrl, tokenAddress, from, to, null, addressTopic),
          getLogsRange(rpcUrl, tokenAddress, from, to, addressTopic, null)
        ]);

        incomeLogs.push(...ins);
        expenseLogs.push(...outs);
      }

      const combined = [
        ...incomeLogs.map(log => parseLog(log, addressLower)).filter(Boolean),
        ...expenseLogs.map(log => parseLog(log, addressLower)).filter(Boolean)
      ];

      const uniq = new Map();
      for (const row of combined) {
        const key = `${row.txHash}-${row.logIndex}-${row.direction}`;
        uniq.set(key, row);
      }

      const rows = [...uniq.values()].sort((a, b) => {
        if (b.blockNumber !== a.blockNumber) return b.blockNumber - a.blockNumber;
        return b.logIndex - a.logIndex;
      });

      const blockNumbers = [...new Set(rows.map(x => x.blockNumber))];
      const timeMap = new Map();

      for (let i = 0; i < blockNumbers.length; i++) {
        const bn = blockNumbers[i];
        showStatus(`正在补充区块时间 ${i + 1}/${blockNumbers.length} ...`, "info");
        const block = await rpcCall(rpcUrl, "eth_getBlockByNumber", [toHex(bn), false]);
        timeMap.set(bn, Number(BigInt(block.timestamp)));
      }

      let incomeTotalRaw = 0n;
      let expenseTotalRaw = 0n;
      let incomeCount = 0;
      let expenseCount = 0;

      const formattedRows = rows.map(r => {
        if (r.direction === "in") {
          incomeTotalRaw += r.value;
          incomeCount++;
        } else {
          expenseTotalRaw += r.value;
          expenseCount++;
        }

        const ts = timeMap.get(r.blockNumber) || 0;
        return {
          txHash: r.txHash,
          blockNumber: r.blockNumber,
          timestamp: ts,
          time: tsToString(ts),
          from: r.from,
          to: r.to,
          amount: formatUnits(r.value, meta.decimals),
          direction: r.direction
        };
      });

      return {
        token: {
          symbol: meta.symbol,
          name: meta.name,
          decimals: meta.decimals,
          contract: tokenAddress
        },
        summary: {
          incomeTotal: formatUnits(incomeTotalRaw, meta.decimals),
          expenseTotal: formatUnits(expenseTotalRaw, meta.decimals),
          netIncome: formatUnits(incomeTotalRaw - expenseTotalRaw, meta.decimals),
          incomeCount,
          expenseCount,
          totalRecords: formattedRows.length
        },
        records: formattedRows
      };
    }

    async function queryByBackend({ address, apiBase, startBlock }) {
      const url = new URL("/api/usdt/history", apiBase.replace(/\/$/, ""));
      url.searchParams.set("address", address);
      url.searchParams.set("startBlock", startBlock);

      const res = await fetch(url.toString());
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`后端接口错误：${res.status} ${text}`);
      }
      return await res.json();
    }

    function renderResult(data, address) {
      $("incomeTotal").textContent = formatDisplay(data.summary.incomeTotal);
      $("expenseTotal").textContent = formatDisplay(data.summary.expenseTotal);
      $("netIncome").textContent = formatDisplay(data.summary.netIncome);
      $("incomeCount").textContent = data.summary.incomeCount ?? 0;
      $("expenseCount").textContent = data.summary.expenseCount ?? 0;
      $("recordCount").textContent = `记录数：${data.summary.totalRecords ?? 0}`;
      $("queryAddress").textContent = `地址：${address}`;
      $("tokenMeta").textContent = `Token：${data.token?.symbol || "USDT"} ｜ ${data.token?.name || ""} ｜ decimals=${data.token?.decimals ?? "-"}`;

      const tbody = $("tbody");
      const rows = data.records || [];
      lastRows = rows;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted">没有查到记录。</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${row.time || "-"}</td>
          <td>${row.direction === "in"
            ? '<span class="badge in">收入</span>'
            : '<span class="badge out">支出</span>'}</td>
          <td>${formatDisplay(row.amount)}</td>
          <td class="mono" title="${row.from}">${shorten(row.from, 10, 8)}</td>
          <td class="mono" title="${row.to}">${shorten(row.to, 10, 8)}</td>
          <td class="mono" title="${row.txHash}">
            <a class="link" target="_blank" rel="noreferrer" href="https://www.oklink.com/xlayer/tx/${row.txHash}">
              ${shorten(row.txHash, 12, 10)}
            </a>
          </td>
          <td>${row.blockNumber}</td>
        </tr>
      `).join("");
    }

    function downloadCSV(rows) {
      if (!rows || !rows.length) {
        showStatus("当前没有可导出的数据。", "error");
        return;
      }

      const header = ["时间", "方向", "金额", "From", "To", "交易哈希", "区块"];
      const lines = rows.map(r => [
        r.time || "",
        r.direction === "in" ? "收入" : "支出",
        r.amount || "",
        r.from || "",
        r.to || "",
        r.txHash || "",
        r.blockNumber || ""
      ]);

      const csv = [header, ...lines]
        .map(arr => arr.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `usdt-history-${Date.now()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    async function handleQuery() {
      const address = $("address").value.trim();
      const mode = $("mode").value;
      const apiBase = $("apiBase").value.trim();
      const rpcUrl = $("rpcUrl").value.trim();
      const tokenAddress = $("tokenAddress").value.trim();
      const startBlockRaw = $("startBlock").value.trim();
      const stepRaw = $("step").value.trim();

      if (!isAddress(address)) {
        showStatus("请输入正确的钱包地址。", "error");
        return;
      }
      if (!isAddress(tokenAddress)) {
        showStatus("USDT 合约地址格式不正确。", "error");
        return;
      }

      const startBlock = startBlockRaw === "" ? 0 : Number(startBlockRaw);
      const step = Number(stepRaw || 5000);

      if (!Number.isFinite(startBlock) || startBlock < 0) {
        showStatus("起始区块必须是大于等于 0 的数字。", "error");
        return;
      }
      if (!Number.isFinite(step) || step <= 0) {
        showStatus("分段区块数必须是正数。", "error");
        return;
      }

      try {
        showStatus("开始查询，请稍候...", "info");
        $("queryBtn").disabled = true;

        let data;
        if (mode === "backend") {
          if (!apiBase) {
            showStatus("你选择了后端 API 模式，请填写后端 API 地址。", "error");
            $("queryBtn").disabled = false;
            return;
          }
          data = await queryByBackend({ address, apiBase, startBlock });
        } else {
          data = await queryByRpc({ address, rpcUrl, tokenAddress, startBlock, step });
        }

        renderResult(data, address);
        showStatus("查询完成。", "success");
      } catch (err) {
        const msg = String(err?.message || err || "");
        if (/Failed to fetch|CORS|NetworkError/i.test(msg)) {
          showStatus("请求被浏览器拦截或网络不可达。解决办法：用后端 API 模式，或者给 RPC / 后端加 CORS。", "error");
        } else {
          showStatus(`查询失败：${msg}`, "error");
        }
      } finally {
        $("queryBtn").disabled = false;
      }
    }

    $("queryBtn").addEventListener("click", handleQuery);
    $("clearBtn").addEventListener("click", () => {
      $("address").value = "";
      $("tbody").innerHTML = `<tr><td colspan="7" class="muted">暂无数据，请输入地址后查询。</td></tr>`;
      $("incomeTotal").textContent = "0";
      $("expenseTotal").textContent = "0";
      $("netIncome").textContent = "0";
      $("incomeCount").textContent = "0";
      $("expenseCount").textContent = "0";
      $("recordCount").textContent = "记录数：0";
      $("queryAddress").textContent = "地址：-";
      $("tokenMeta").textContent = "Token：-";
      lastRows = [];
      clearStatus();
    });
    $("exportBtn").addEventListener("click", () => downloadCSV(lastRows));
  </script>
</body>
</html>
