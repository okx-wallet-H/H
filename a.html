<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>海豚社区 · 网格挂单策略</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1220 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 2rem 1rem;
            color: #edf2f7;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a5f3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            border-left: 3px solid #38bdf8;
            padding-left: 0.75rem;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .input-field {
            flex: 1;
            min-width: 140px;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
        }
        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
        }
        button {
            background: #2563eb;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #3b82f6;
        }
        .result-table {
            overflow-x: auto;
            margin-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0b1120;
            border-radius: 1rem;
            font-size: 0.8rem;
        }
        th, td {
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }
        th {
            background: #0f172a;
            color: #7dd3fc;
            font-weight: 500;
        }
        .price-highlight {
            color: #facc15;
            font-weight: 600;
        }
        .info-note {
            background: rgba(56, 189, 248, 0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            font-size: 0.75rem;
            color: #9cb3e0;
            margin-top: 1rem;
            line-height: 1.4;
        }
        .info-note strong {
            color: #7dd3fc;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🐬 区间网格挂单策略</h1>
        <div class="sub">基于 AMM 恒定乘积 | 输入价格区间与本金，自动生成买卖挂单</div>

        <div class="input-row">
            <div class="input-field">
                <label>💰 当前价格 (U/H)</label>
                <input type="number" id="currentPrice" step="0.0001" value="0.0055125">
            </div>
            <div class="input-field">
                <label>📉 震荡区间下限 (U/H)</label>
                <input type="number" id="priceLow" step="0.0001" value="0.0050">
            </div>
            <div class="input-field">
                <label>📈 震荡区间上限 (U/H)</label>
                <input type="number" id="priceHigh" step="0.0001" value="0.0060">
            </div>
        </div>
        <div class="input-row">
            <div class="input-field">
                <label>💵 做市本金 (U, 用于买入)</label>
                <input type="number" id="capital" step="1000" value="10000">
            </div>
            <div class="input-field">
                <label>🔢 网格层数 (2~8)</label>
                <input type="number" id="gridLevels" step="1" min="2" max="8" value="3">
            </div>
        </div>
        <div class="input-row">
            <button id="calcBtn">✨ 生成挂单网格</button>
        </div>
    </div>

    <div id="resultCard" class="card" style="display: none;">
        <h2 style="font-size:1.2rem; margin-bottom:0.5rem;">📋 挂单明细</h2>
        <div id="gridTable" class="result-table"></div>
        <div id="taxNote" class="info-note"></div>
    </div>
    <footer>※ 恒定乘积 k=2e12（基于初始流动性）。挂单量已按市场深度限制，避免过度滑点。详细说明见下方注释。</footer>
</div>

<script>
    // 恒定乘积常数 (基于初始流动性池: U=105000, H≈19047619)
    const K = 2e12;
    // 安全系数（固定80%，确保挂单量不超过市场深度的80%，避免滑点过大）
    const SAFETY = 0.8;

    // DOM 元素
    const currentPriceInput = document.getElementById('currentPrice');
    const priceLowInput = document.getElementById('priceLow');
    const priceHighInput = document.getElementById('priceHigh');
    const capitalInput = document.getElementById('capital');
    const gridLevelsInput = document.getElementById('gridLevels');
    const calcBtn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');
    const gridTableDiv = document.getElementById('gridTable');
    const taxNoteDiv = document.getElementById('taxNote');

    // 辅助格式化
    function formatNum(n, decimals=6) {
        if (n === undefined || isNaN(n)) return '0';
        if (Math.abs(n) > 1e6) return n.toLocaleString('en-US', {maximumFractionDigits: 0});
        if (Math.abs(n) < 0.0001 && n !== 0) return n.toExponential(4);
        return n.toFixed(decimals);
    }
    function formatLarge(n) {
        if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
        if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
        if (n >= 1e3) return (n/1e3).toFixed(2)+'K';
        return n.toFixed(2);
    }

    // 根据价格获取当前池子 U 和 H
    function getPoolState(price) {
        const U = Math.sqrt(K * price);
        const H = Math.sqrt(K / price);
        return { U, H };
    }

    // 计算外部可提供的交易量（用于限制挂单）
    function getExternalAmount(currentPrice, targetPrice, direction) {
        const curr = getPoolState(currentPrice);
        const target = getPoolState(targetPrice);
        if (direction === 'buy') {
            // 价格下跌到 targetPrice，需要外部卖出 H 量
            return Math.max(0, target.H - curr.H);
        } else {
            // 价格上涨到 targetPrice，需要外部买入 H 量
            return Math.max(0, curr.H - target.H);
        }
    }

    function generateStrategy() {
        // 获取输入
        let currentPrice = parseFloat(currentPriceInput.value);
        let low = parseFloat(priceLowInput.value);
        let high = parseFloat(priceHighInput.value);
        let capital = parseFloat(capitalInput.value);
        let levels = parseInt(gridLevelsInput.value);

        if (isNaN(currentPrice) || currentPrice <= 0) currentPrice = 0.0055125;
        if (isNaN(low) || low <= 0) low = currentPrice * 0.9;
        if (isNaN(high) || high <= low) high = currentPrice * 1.1;
        if (isNaN(capital) || capital <= 0) capital = 10000;
        if (isNaN(levels) || levels < 2) levels = 2;
        if (levels > 8) levels = 8;

        // 确保区间包含当前价格（仅用于计算，不强制）
        const effectiveLow = Math.min(low, currentPrice);
        const effectiveHigh = Math.max(high, currentPrice);

        // 生成网格价格点（等间距）
        const step = (effectiveHigh - effectiveLow) / levels;
        let gridPrices = [];
        for (let i = 0; i <= levels; i++) {
            gridPrices.push(effectiveLow + i * step);
        }

        // 分配买单资金（所有买单总预算 = capital U）
        const buyGridCount = levels;      // 除最高价外，每个网格点都可挂买单
        const perBuyBudget = capital / buyGridCount;

        // 卖单可用 H 总量：价值 capital U 的 H（因为本金对称，一半U一半H）
        const availableHForSell = capital / currentPrice;
        const sellGridCount = levels;     // 除最低价外，每个网格点都可挂卖单
        const perSellH = availableHForSell / sellGridCount;

        const buyOrders = [];
        const sellOrders = [];

        // 遍历每个网格点，生成挂单
        for (let i = 0; i <= levels; i++) {
            const price = gridPrices[i];
            // 买入挂单（价格低于当前价才可能成交，但策略允许在任意网格挂单，我们仅限制低于当前价的网格点）
            if (i < levels) {
                const buyPrice = price;
                // 外部卖盘量
                const externalSell = getExternalAmount(currentPrice, buyPrice, 'buy');
                let maxBuyH = externalSell * SAFETY;
                // 预算可买 H 量
                let budgetH = perBuyBudget / buyPrice;
                let actualBuyH = Math.min(budgetH, maxBuyH);
                if (maxBuyH <= 0) actualBuyH = 0;
                const requiredU = actualBuyH * buyPrice;
                buyOrders.push({
                    price: buyPrice,
                    hAmount: actualBuyH,
                    uCost: requiredU,
                    valid: actualBuyH > 0
                });
            }
            // 卖出挂单（价格高于当前价）
            if (i > 0) {
                const sellPrice = price;
                const externalBuy = getExternalAmount(currentPrice, sellPrice, 'sell');
                let maxSellH = externalBuy * SAFETY;
                let actualSellH = Math.min(perSellH, maxSellH);
                if (maxSellH <= 0) actualSellH = 0;
                const grossU = actualSellH * sellPrice;
                sellOrders.push({
                    price: sellPrice,
                    hAmount: actualSellH,
                    grossU: grossU,
                    valid: actualSellH > 0
                });
            }
        }

        renderTable(buyOrders, sellOrders, gridPrices);
    }

    function renderTable(buyOrders, sellOrders, gridPrices) {
        // 创建价格到数据的映射
        const buyMap = new Map();
        const sellMap = new Map();
        buyOrders.forEach(b => buyMap.set(b.price, b));
        sellOrders.forEach(s => sellMap.set(s.price, s));

        const allPrices = [...new Set([...buyMap.keys(), ...sellMap.keys()])].sort((a,b) => a-b);
        if (allPrices.length === 0) {
            gridTableDiv.innerHTML = '<div class="info-note">⚠️ 无法生成有效挂单，请调整区间或本金。</div>';
            taxNoteDiv.innerHTML = '';
            resultCard.style.display = 'block';
            return;
        }

        let html = `<table>
            <thead>
                <tr>
                    <th>网格价格 (U/H)</th>
                    <th>买入挂单 (H)</th>
                    <th>买入所需 (U)</th>
                    <th>卖出挂单 (H)</th>
                    <th>卖出预期收入 (U)</th>
                </tr>
            </thead>
            <tbody>`;
        for (let price of allPrices) {
            const buy = buyMap.get(price);
            const sell = sellMap.get(price);
            const buyH = buy && buy.valid ? formatLarge(buy.hAmount) : '—';
            const buyCost = buy && buy.valid ? formatNum(buy.uCost, 2) : '—';
            const sellH = sell && sell.valid ? formatLarge(sell.hAmount) : '—';
            const sellIncome = sell && sell.valid ? formatNum(sell.grossU, 2) : '—';
            html += `<tr>
                <td class="price-highlight">${formatNum(price, 6)}</td>
                <td>${buyH}</td>
                <td>${buyCost}</td>
                <td>${sellH}</td>
                <td>${sellIncome}</td>
            </tr>`;
        }
        html += `</tbody></table>`;
        gridTableDiv.innerHTML = html;

        // 计算最小价差比例，用于税收提示
        let minRatio = Infinity;
        for (let i = 0; i < gridPrices.length - 1; i++) {
            const ratio = gridPrices[i+1] / gridPrices[i];
            if (ratio < minRatio) minRatio = ratio;
        }
        const required = 1 / 0.95; // ≈1.05263
        let taxMsg = '';
        if (minRatio < required) {
            taxMsg = `⚠️ 当前网格最小价差 ${((minRatio-1)*100).toFixed(2)}%，小于覆盖5%交易税所需价差5.263%。单次低买高卖可能亏损，建议扩大区间或减少网格层数。`;
        } else {
            taxMsg = `✅ 当前网格最小价差 ${((minRatio-1)*100).toFixed(2)}%，满足税收覆盖条件（价差≥5.263%），单次套利可盈利。`;
        }
        taxNoteDiv.innerHTML = `${taxMsg}<br>💡 说明：交易税5%已由国库收取，本策略挂单数量已按市场深度（安全系数80%）限制，避免滑点过大。实际成交后，买入所需U已包含税费，卖出收入为税前金额。`;

        resultCard.style.display = 'block';
    }

    calcBtn.addEventListener('click', generateStrategy);
    generateStrategy();
</script>
</body>
</html>
