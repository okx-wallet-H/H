<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>海豚社区 · 挂单策略计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1220 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 2rem 1rem;
            color: #edf2f7;
        }
        .container {
            max-width: 780px;
            margin: 0 auto;
        }
        .card {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.25);
            padding: 1.6rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a5f3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 1.2rem;
            border-left: 3px solid #38bdf8;
            padding-left: 0.75rem;
        }
        .price-input {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .price-input label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        .price-input input {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            width: 160px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .price-input input:focus {
            border-color: #38bdf8;
        }
        .strategy-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .strategy-btn {
            flex: 1;
            background: #1e293b;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 0;
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .strategy-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 0 10px rgba(37,99,235,0.4);
        }
        .result-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0;
        }
        .result-box {
            flex: 1;
            background: #0b1120;
            border-radius: 1.2rem;
            padding: 1rem;
            border-left: 3px solid #38bdf8;
        }
        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #7e8bb0;
            letter-spacing: 1px;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #facc15;
            word-break: break-word;
        }
        .sub-value {
            font-size: 0.75rem;
            color: #8ba3cf;
            margin-top: 0.3rem;
        }
        .divider {
            height: 1px;
            background: #1e2a44;
            margin: 1rem 0;
        }
        .status {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            margin-top: 0.8rem;
        }
        .ok { color: #4ade80; }
        .warn { color: #f97316; }
        .info {
            font-size: 0.7rem;
            color: #7e8bb0;
            text-align: center;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 1rem;
        }
        button {
            background: none;
            border: none;
        }
        .badge {
            background: #1e293b;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            display: inline-block;
            margin-right: 0.4rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🐬 挂单策略 · 实时计算器</h1>
        <div class="sub">基于 AMM 恒定乘积 | 覆盖 5% 交易税 | 双向挂单建议</div>

        <div class="price-input">
            <label>🔥 H 实时价格 (U/H)</label>
            <input type="number" id="currentPrice" step="0.0001" value="0.0055125" placeholder="例如 0.0055125">
        </div>

        <div class="strategy-buttons">
            <div id="btnAggressive" class="strategy-btn active">⚡ 进取型</div>
            <div id="btnModerate" class="strategy-btn">🛡️ 稳健型</div>
            <div id="btnRisk" class="strategy-btn">⚠️ 风险型</div>
        </div>

        <div class="result-grid">
            <div class="result-box">
                <div class="result-label">🔽 买入挂单 (低价吸筹)</div>
                <div id="buyPrice" class="result-value">—</div>
                <div id="buyAmount" class="sub-value">建议挂单量: —</div>
                <div id="buyCost" class="sub-value">所需资金(含税): —</div>
                <div id="buyTax" class="sub-value">税收贡献国库: —</div>
            </div>
            <div class="result-box">
                <div class="result-label">🔼 卖出挂单 (高价抛售)</div>
                <div id="sellPrice" class="result-value">—</div>
                <div id="sellAmount" class="sub-value">建议挂单量: —</div>
                <div id="sellIncome" class="sub-value">预期收入(税前): —</div>
                <div id="sellTax" class="sub-value">税收贡献国库: —</div>
            </div>
        </div>

        <div id="profitStatus" class="status">—</div>
        <div class="info">
            💡 三种策略区别：进取型价差小(高频率)、稳健型平衡、风险型价差大(高利润低概率)。<br>
            📌 交易量越高，欧易空投奖励越丰厚，建议根据市场波动选择策略。
        </div>
    </div>
    <footer>※ 计算基于 Uniswap V2 恒定乘积模型，默认池子流动性为基准深度。挂单量已考虑安全系数，避免过度滑点。</footer>
</div>

<script>
    // ---------- 恒定乘积参数 (基于典型流动性规模，仅用于深度计算，界面不展示) ----------
    // 我们设定一个参考流动性：当价格 = 0.0055125 U/H 时，池子 U=105,000，H≈19,047,619
    // 恒定乘积 k = U * H = 2e12 (固定)
    const K_CONST = 2e12;   // 恒定乘积常数
    
    // 策略配置 (价差 spread, 安全系数 safetyFactor)
    const strategies = {
        aggressive: { name: '进取型', spread: 0.04, safety: 0.90, desc: '价差4%，高成交频率' },
        moderate:   { name: '稳健型', spread: 0.06, safety: 0.80, desc: '价差6%，平衡收益' },
        risk:       { name: '风险型', spread: 0.09, safety: 0.70, desc: '价差9%，高利润但低概率' }
    };
    
    let currentStrategy = 'aggressive';   // aggressive, moderate, risk
    let price = 0.0055125;
    
    // DOM 元素
    const priceInput = document.getElementById('currentPrice');
    const btnAgg = document.getElementById('btnAggressive');
    const btnMod = document.getElementById('btnModerate');
    const btnRisk = document.getElementById('btnRisk');
    
    const buyPriceDiv = document.getElementById('buyPrice');
    const buyAmountDiv = document.getElementById('buyAmount');
    const buyCostDiv = document.getElementById('buyCost');
    const buyTaxDiv = document.getElementById('buyTax');
    const sellPriceDiv = document.getElementById('sellPrice');
    const sellAmountDiv = document.getElementById('sellAmount');
    const sellIncomeDiv = document.getElementById('sellIncome');
    const sellTaxDiv = document.getElementById('sellTax');
    const profitStatusDiv = document.getElementById('profitStatus');
    
    // 辅助格式化
    function formatNum(n, decimals=4) {
        if (n === undefined || isNaN(n)) return '0';
        if (Math.abs(n) > 1e6) return n.toLocaleString('en-US', {maximumFractionDigits: 0});
        if (Math.abs(n) < 0.0001) return n.toExponential(4);
        return n.toFixed(decimals);
    }
    
    function formatLarge(n) {
        if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
        if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
        if (n >= 1e3) return (n/1e3).toFixed(2)+'K';
        return n.toFixed(2);
    }
    
    // 核心计算：给定价格和策略，返回买入/卖出建议
    function computeStrategy(price, strategyKey) {
        const strat = strategies[strategyKey];
        const spread = strat.spread;
        const safety = strat.safety;
        
        // 根据当前价格，利用恒定乘积反推当前池子状态 (假设池子深度与价格成比例，但保持 k 恒定)
        // 由 k = U * H, 价格 = U/H => U = sqrt(k * price), H = sqrt(k / price)
        const U_current = Math.sqrt(K_CONST * price);
        const H_current = Math.sqrt(K_CONST / price);
        
        // 买入挂单价 (低于现价)
        const buyPrice = price * (1 - spread);
        // 买入价对应的池子 H 储备
        const H_buy = Math.sqrt(K_CONST / buyPrice);
        // 外部需要净卖出的 H 量 (从当前价跌到买入价所需卖盘)
        const externalSellH = H_buy - H_current;
        let maxBuyH = 0, totalCost = 0, buyTax = 0;
        let buyValid = externalSellH > 0;
        if (buyValid) {
            maxBuyH = externalSellH * safety;
            totalCost = maxBuyH * buyPrice;          // 含税总支付 U
            buyTax = totalCost * 0.05;
        }
        
        // 卖出挂单价 (高于现价)
        const sellPrice = price * (1 + spread);
        const H_sell = Math.sqrt(K_CONST / sellPrice);
        const externalBuyH = H_current - H_sell;
        let maxSellH = 0, grossIncome = 0, sellTax = 0;
        let sellValid = externalBuyH > 0;
        if (sellValid) {
            maxSellH = externalBuyH * safety;
            grossIncome = maxSellH * sellPrice;       // 税前总收入 U
            sellTax = grossIncome * 0.05;
        }
        
        // 税收盈亏分析
        const breakEvenRatio = 1 / 0.95;   // ≈1.05263
        const actualRatio = (1+spread)/(1-spread);
        const canProfit = actualRatio > breakEvenRatio;
        
        return {
            buyValid, sellValid,
            buyPrice, sellPrice,
            maxBuyH, totalCost, buyTax,
            maxSellH, grossIncome, sellTax,
            canProfit, actualRatio, breakEvenRatio,
            spreadPercent: spread*100
        };
    }
    
    function updateUI() {
        const p = parseFloat(priceInput.value);
        if (isNaN(p) || p <= 0) {
            price = 0.0055125;
            priceInput.value = price;
        } else {
            price = p;
        }
        
        const res = computeStrategy(price, currentStrategy);
        const strat = strategies[currentStrategy];
        
        // 买入显示
        buyPriceDiv.innerText = res.buyPrice.toFixed(8) + ' U/H';
        if (res.buyValid) {
            buyAmountDiv.innerText = `建议挂单量: ${formatLarge(res.maxBuyH)} H (需外部卖盘 ≈ ${formatLarge(res.externalSellH || 0)} H)`;
            buyCostDiv.innerText = `所需资金(含税): ${formatNum(res.totalCost, 2)} U`;
            buyTaxDiv.innerText = `税收贡献国库: ${formatNum(res.buyTax, 2)} U`;
        } else {
            buyAmountDiv.innerText = `⚠️ 价差过小，无外部卖盘支撑，可增大价差或等待下跌`;
            buyCostDiv.innerText = `—`;
            buyTaxDiv.innerText = `—`;
        }
        
        // 卖出显示
        sellPriceDiv.innerText = res.sellPrice.toFixed(8) + ' U/H';
        if (res.sellValid) {
            sellAmountDiv.innerText = `建议挂单量: ${formatLarge(res.maxSellH)} H (需外部买盘 ≈ ${formatLarge(res.externalBuyH || 0)} H)`;
            sellIncomeDiv.innerText = `预期收入(税前): ${formatNum(res.grossIncome, 2)} U`;
            sellTaxDiv.innerText = `税收贡献国库: ${formatNum(res.sellTax, 2)} U`;
        } else {
            sellAmountDiv.innerText = `⚠️ 价差过小，无外部买盘支撑，可增大价差或等待上涨`;
            sellIncomeDiv.innerText = `—`;
            sellTaxDiv.innerText = `—`;
        }
        
        // 状态栏
        if (res.canProfit) {
            profitStatusDiv.innerHTML = `✅ ${strat.name} 策略 | 价差 ${res.spreadPercent.toFixed(1)}% 满足税收覆盖 (卖出/买入比=${res.actualRatio.toFixed(4)} > ${res.breakEvenRatio.toFixed(4)})，套利有利可图。成交概率适中，适合当前波动。`;
            profitStatusDiv.className = 'status ok';
        } else {
            profitStatusDiv.innerHTML = `⚠️ ${strat.name} 策略 | 价差 ${res.spreadPercent.toFixed(1)}% 不足以覆盖双向5%交易税 (需卖出价/买入价 > 1.05263)。建议提高价差或选择进取型以上策略。`;
            profitStatusDiv.className = 'status warn';
        }
        
        // 附加提示：若交易量大可获得空投
        const extraNote = document.querySelector('.info');
        if (extraNote) {
            extraNote.innerHTML = `💡 当前使用 <strong>${strat.name}</strong> (${strat.desc})。<br>📌 用户双向交易量越高，欧易空投奖励越丰厚。策略挂单有助于增加池子深度，吸引更多交易。`;
        }
    }
    
    // 策略切换
    function setStrategy(strategy) {
        currentStrategy = strategy;
        // 更新按钮样式
        btnAgg.classList.remove('active');
        btnMod.classList.remove('active');
        btnRisk.classList.remove('active');
        if (strategy === 'aggressive') btnAgg.classList.add('active');
        if (strategy === 'moderate') btnMod.classList.add('active');
        if (strategy === 'risk') btnRisk.classList.add('active');
        updateUI();
    }
    
    // 绑定事件
    btnAgg.addEventListener('click', () => setStrategy('aggressive'));
    btnMod.addEventListener('click', () => setStrategy('moderate'));
    btnRisk.addEventListener('click', () => setStrategy('risk'));
    priceInput.addEventListener('input', updateUI);
    
    // 初始化
    updateUI();
</script>
</body>
</html>
