<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Web3 Alpha Wallet · 精致增强版</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    // 主题初始化与切换逻辑（放在 head 中尽早执行）
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      let theme = 'system';
      if (savedTheme) {
        theme = savedTheme;
      }

      function applyTheme() {
        const isDark = theme === 'dark' || (theme === 'system' && prefersDark);
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.classList.toggle('light', !isDark);
      }

      applyTheme();

      // 监听系统主题变化
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (theme === 'system') applyTheme();
      });

      // 暴露给全局（供按钮调用）
      window.setTheme = function(newTheme) {
        theme = newTheme;
        localStorage.setItem('theme', newTheme);
        applyTheme();
      };
    })();
  </script>

  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --card: #ffffff;
      --border: rgba(226,232,240,0.8);
      --gradient-start: #7c3aed;
      --gradient-end: #4c1d95;
    }

    .dark {
      --bg: #020617;
      --text: #f1f5f9;
      --card: #0f172a;
      --border: rgba(30,41,59,0.8);
      --gradient-start: #6d28d9;
      --gradient-end: #3b0764;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .purple-gradient {
      background: linear-gradient(145deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
      box-shadow: 0 20px 25px -8px rgba(124,58,237,0.35), inset 0 -1px 0 rgba(255,255,255,0.15);
    }

    .tab-active {
      color: #a78bfa;
      border-bottom: 3px solid #a78bfa;
    }

    .dark .tab-active {
      color: #c4b5fd;
      border-bottom-color: #c4b5fd;
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }

    .bottom-sheet {
      transition: transform 0.42s cubic-bezier(0.23, 1, 0.32, 1);
      transform: translateY(100%);
    }
    .bottom-sheet.active { transform: translateY(0); }

    .overlay {
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
    }
    .overlay.active { opacity: 1; pointer-events: auto; }

    .hover-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.12);
    }
    .dark .hover-card:hover {
      background: #1e293b;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
    }

    .btn-scale:active { transform: scale(0.94); }

    input:focus, select:focus {
      box-shadow: 0 0 0 4px rgba(124,58,237,0.2);
      border-color: #a78bfa;
    }
    .dark input:focus, .dark select:focus {
      box-shadow: 0 0 0 4px rgba(167,139,250,0.3);
      border-color: #c4b5fd;
    }

    .nav-active { color: #a78bfa; }
    .dark .nav-active { color: #c4b5fd; }

    .sheet-handle { width: 50px; height: 5px; background: #cbd5e1; border-radius: 9999px; }
    .dark .sheet-handle { background: #475569; }
  </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x border-gray-200/40 dark:border-gray-700/40 shadow-2xl relative pb-24">

  <!-- 顶部区域 -->
  <div class="purple-gradient text-white p-8 pb-10 rounded-b-[40px] shadow-2xl">
    <div class="flex justify-between items-center mb-7">
      <div class="flex bg-black/20 rounded-full border border-white/20 backdrop-blur-md p-1">
        <button onclick="selectNet('all')" id="net-all" class="network-pill active px-4 py-1.5 rounded-full text-xs font-medium transition-all" aria-label="全部">全部</button>
        <button onclick="selectNet('xlayer')" id="net-xlayer" class="network-pill px-4 py-1.5 rounded-full text-xs font-medium transition-all" aria-label="X Layer">X Layer</button>
        <button onclick="selectNet('bnb')" id="net-bnb" class="network-pill px-4 py-1.5 rounded-full text-xs font-medium transition-all" aria-label="BNB">BNB</button>
      </div>
      <div class="flex items-center gap-6">
        <i data-lucide="receipt" class="w-6 h-6 opacity-90 cursor-pointer hover:opacity-100" aria-hidden="true"></i>
        <i data-lucide="scan" class="w-6 h-6 opacity-90 cursor-pointer hover:opacity-100" aria-hidden="true"></i>
        <!-- 主题切换按钮 -->
        <button id="theme-toggle" class="w-9 h-9 rounded-full bg-black/20 flex items-center justify-center hover:bg-black/30 transition" aria-label="切换主题">
          <i data-lucide="sun" class="w-5 h-5 light:block hidden"></i>
          <i data-lucide="moon" class="w-5 h-5 dark:block hidden"></i>
        </button>
      </div>
    </div>

    <p class="text-sm opacity-85 mb-1.5">总资产估值 (USD)</p>
    <h1 class="text-4xl font-bold tracking-tight">$10,390.50</h1>

    <div class="inline-flex items-center gap-3 bg-black/20 px-4 py-2 rounded-full border border-white/15 backdrop-blur-md text-sm font-mono mt-4">
      <span>0x71C...a29E</span>
      <i data-lucide="copy" class="w-4 h-4 opacity-80 cursor-pointer hover:opacity-100" onclick="copyAddress('0x71Cd4d9dA0f0b1a2a3b4c5d6e7f8g9h0i1j2k3l4m5n')"></i>
    </div>
  </div>

  <!-- 四大功能按钮（暗黑适配） -->
  <div class="grid grid-cols-4 gap-6 px-6 -mt-10 relative z-10">
    <div class="flex flex-col items-center">
      <button onclick="toggleSheet('充币')" class="w-16 h-16 bg-white dark:bg-gray-800 rounded-3xl shadow-xl dark:shadow-2xl flex items-center justify-center text-violet-600 dark:text-violet-400 hover:shadow-2xl transition-all btn-scale" aria-label="充币">
        <i data-lucide="arrow-down-to-line" class="w-6 h-6"></i>
      </button>
      <span class="mt-3 text-sm font-medium text-gray-700 dark:text-gray-300">充币</span>
    </div>
    <!-- 其他三个按钮类似，略去重复代码 -->
  </div>

  <!-- 其余结构保持原样，只需在类名中添加 dark: 前缀适配 -->
  <!-- 示例：代币卡片 -->
  <div class="mt-10 px-6">
    <div class="flex gap-10 border-b border-gray-200 dark:border-gray-700">
      <button id="tokenTab" class="pb-4 text-base font-semibold tab-active" onclick="switchTab('tokens')">代币列表</button>
      <button id="defiTab" class="pb-4 text-base font-medium text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" onclick="switchTab('defi')">DeFi 资产</button>
    </div>

    <div id="tokenContent" class="mt-6 space-y-4">
      <div class="flex justify-between items-center p-4 rounded-2xl bg-white dark:bg-gray-800 hover-card cursor-pointer shadow-sm border border-gray-200 dark:border-gray-700">
        <!-- ... 代币内容 ... -->
      </div>
      <!-- 其他代币类似 -->
    </div>
  </div>

  <!-- 底部导航（暗黑适配） -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border-t border-gray-200 dark:border-gray-700 px-10 py-3 flex justify-between z-40">
    <div class="nav-active flex flex-col items-center">
      <i data-lucide="wallet" class="w-6 h-6"></i>
      <span class="text-xs mt-1">钱包</span>
    </div>
    <!-- 其他图标 -->
  </nav>

  <!-- 遮罩 & 底部抽屉（已适配） -->
  <div id="overlay" class="overlay fixed inset-0 z-50" onclick="toggleSheet()"></div>
  <div id="bottomSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-gray-900 z-[60] shadow-2xl rounded-t-[40px]">
    <div class="sheet-handle mx-auto my-4"></div>
    <h2 id="sheetTitle" class="text-2xl font-bold text-center mb-6 text-gray-900 dark:text-gray-100">操作</h2>
    <!-- 面板内容保持原样，添加 dark: 类适配颜色 -->
    <button onclick="toggleSheet()" class="w-full mt-8 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
      取消
    </button>
  </div>

  <script>
    lucide.createIcons();

    // 主题切换按钮事件
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      window.setTheme(next);
    });

    // 其他原有函数（selectNet, switchTab, copyAddress, toggleSheet 等）保持不变
  </script>
</body>
</html>
