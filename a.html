<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海豚社区 · 挂单策略计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b1120;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            color: #e2e8f0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #7dd3fc;
        }
        .sub {
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.75rem;
        }
        .card {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            border: 1px solid #1e293b;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .input-group {
            flex: 1;
            min-width: 140px;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
        }
        input {
            width: 100%;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
        .range-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
        }
        input[type="range"] {
            padding: 0;
            height: 4px;
            background: #1e293b;
        }
        .badge {
            background: #1e293b;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-right: 0.4rem;
        }
        .result-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .result-card {
            flex: 1;
            background: #0a0f1c;
            border-radius: 1rem;
            padding: 0.8rem;
        }
        .result-title {
            font-size: 0.7rem;
            color: #7dd3fc;
            margin-bottom: 0.3rem;
        }
        .result-value {
            font-size: 1.3rem;
            font-weight: 600;
            word-break: break-word;
        }
        .small-text {
            font-size: 0.7rem;
            color: #8ca3c9;
            margin-top: 0.4rem;
        }
        .divider {
            height: 1px;
            background: #1e293b;
            margin: 1rem 0;
        }
        .status {
            font-size: 0.8rem;
            padding: 0.5rem;
            border-radius: 0.75rem;
            background: #0b1120;
            margin-top: 0.8rem;
        }
        .ok { color: #4ade80; }
        .warn { color: #f97316; }
        hr {
            border-color: #1e293b;
            margin: 0.8rem 0;
        }
        button {
            background: #2563eb;
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #3b82f6;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐬 挂单策略计算器</h1>
    <div class="sub">基于 Uniswap V2 AMM | 覆盖5%交易税 | 自动估算挂单深度</div>

    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label>池子 U 储备 (USDT)</label>
                <input type="number" id="poolU" value="105000" step="5000">
            </div>
            <div class="input-group">
                <label>池子 H 储备 (H代币)</label>
                <input type="number" id="poolH" value="19047619" step="500000">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <div class="range-label"><span>挂单价差 (±%)</span><span id="spreadVal">6.0%</span></div>
                <input type="range" id="spread" min="1" max="12" step="0.5" value="6">
            </div>
            <div class="input-group">
                <div class="range-label"><span>安全系数 (挂单量占比)</span><span id="safeVal">80%</span></div>
                <input type="range" id="safety" min="0.5" max="1" step="0.05" value="0.8">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>当前价格 (U/H)</label>
                <input type="text" id="currentPrice" readonly>
            </div>
            <div class="input-group">
                <label>恒定乘积 k</label>
                <input type="text" id="kValue" readonly>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="result-card">
                <div class="result-title">🔽 买入挂单 (低价吸筹)</div>
                <div id="buyPrice" class="result-value">—</div>
                <div id="buyAmount" class="small-text">建议挂单量: —</div>
                <div id="buyCost" class="small-text">所需资金(含税): —</div>
                <div id="buyTax" class="small-text">税收贡献国库: —</div>
            </div>
            <div class="result-card">
                <div class="result-title">🔼 卖出挂单 (高价抛售)</div>
                <div id="sellPrice" class="result-value">—</div>
                <div id="sellAmount" class="small-text">建议挂单量: —</div>
                <div id="sellIncome" class="small-text">预期收入(税前): —</div>
                <div id="sellTax" class="small-text">税收贡献国库: —</div>
            </div>
        </div>
        <div class="divider"></div>
        <div id="profitStatus" class="status">—</div>
        <div id="strategyTip" class="small-text" style="margin-top: 0.6rem;">💡 双向挂单(网格)无需预测方向，价差满足税收条件即可稳健获利。</div>
    </div>
    <footer>※ 安全系数建议 ≤80%，避免过度滑点。盈亏平衡需卖出价/买入价 > 1.05263 (约5.263%涨幅)。</footer>
</div>

<script>
    const poolUInput = document.getElementById('poolU');
    const poolHInput = document.getElementById('poolH');
    const spreadSlider = document.getElementById('spread');
    const spreadVal = document.getElementById('spreadVal');
    const safetySlider = document.getElementById('safety');
    const safeVal = document.getElementById('safeVal');
    const currentPriceSpan = document.getElementById('currentPrice');
    const kValueSpan = document.getElementById('kValue');

    const buyPriceDiv = document.getElementById('buyPrice');
    const buyAmountDiv = document.getElementById('buyAmount');
    const buyCostDiv = document.getElementById('buyCost');
    const buyTaxDiv = document.getElementById('buyTax');
    const sellPriceDiv = document.getElementById('sellPrice');
    const sellAmountDiv = document.getElementById('sellAmount');
    const sellIncomeDiv = document.getElementById('sellIncome');
    const sellTaxDiv = document.getElementById('sellTax');
    const profitStatusDiv = document.getElementById('profitStatus');

    function formatNumber(n, decimals=4) {
        if (n === undefined || isNaN(n)) return '0';
        if (Math.abs(n) > 1e6) return n.toLocaleString('en-US', {maximumFractionDigits: 0});
        if (Math.abs(n) < 0.0001) return n.toExponential(4);
        return n.toFixed(decimals);
    }

    function formatLarge(n) {
        if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
        if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
        if (n >= 1e3) return (n/1e3).toFixed(2)+'K';
        return n.toFixed(2);
    }

    function compute() {
        let U = parseFloat(poolUInput.value);
        let H = parseFloat(poolHInput.value);
        if (isNaN(U) || U <= 0) U = 105000;
        if (isNaN(H) || H <= 0) H = 19047619;
        const k = U * H;
        const price = U / H;

        const spread = parseFloat(spreadSlider.value) / 100;
        spreadVal.innerText = (spread*100).toFixed(1)+'%';
        const safety = parseFloat(safetySlider.value);
        safeVal.innerText = (safety*100).toFixed(0)+'%';

        currentPriceSpan.value = price.toFixed(8);
        kValueSpan.value = formatLarge(k) + ' (' + k.toExponential(4)+')';

        // 买入策略
        const buyPrice = price * (1 - spread);
        const H_buy = Math.sqrt(k / buyPrice);
        const externalSellH = H_buy - H;          // 需要外部净卖出H量
        const maxBuyH = Math.max(0, externalSellH * safety);
        const totalCost = maxBuyH * buyPrice;      // 含税总U支付
        const buyTax = totalCost * 0.05;
        
        // 卖出策略
        const sellPrice = price * (1 + spread);
        const H_sell = Math.sqrt(k / sellPrice);
        const externalBuyH = H - H_sell;
        const maxSellH = Math.max(0, externalBuyH * safety);
        const grossIncome = maxSellH * sellPrice;   // 税前总收入
        const sellTax = grossIncome * 0.05;
        const netIncome = grossIncome * 0.95;

        // 显示
        buyPriceDiv.innerText = buyPrice.toFixed(8) + ' U/H';
        if (externalSellH > 0) {
            buyAmountDiv.innerText = `建议挂单量: ${formatLarge(maxBuyH)} H (需外部卖盘 ${formatLarge(externalSellH)} H)`;
            buyCostDiv.innerText = `所需资金(含税): ${formatNumber(totalCost,2)} U`;
            buyTaxDiv.innerText = `税收贡献国库: ${formatNumber(buyTax,2)} U`;
        } else {
            buyAmountDiv.innerText = `⚠️ 价差过小，无外部卖盘支持，增大价差或等待下跌`;
            buyCostDiv.innerText = `--`;
            buyTaxDiv.innerText = `--`;
        }

        sellPriceDiv.innerText = sellPrice.toFixed(8) + ' U/H';
        if (externalBuyH > 0) {
            sellAmountDiv.innerText = `建议挂单量: ${formatLarge(maxSellH)} H (需外部买盘 ${formatLarge(externalBuyH)} H)`;
            sellIncomeDiv.innerText = `预期收入(税前): ${formatNumber(grossIncome,2)} U`;
            sellTaxDiv.innerText = `税收贡献国库: ${formatNumber(sellTax,2)} U`;
        } else {
            sellAmountDiv.innerText = `⚠️ 价差过小，无外部买盘支持，增大价差或等待上涨`;
            sellIncomeDiv.innerText = `--`;
            sellTaxDiv.innerText = `--`;
        }

        // 税收盈亏分析
        const breakEvenRatio = 1 / 0.95;  // ≈1.05263
        const actualRatio = (1+spread)/(1-spread);
        if (actualRatio > breakEvenRatio) {
            profitStatusDiv.innerHTML = `✅ 当前价差 ${(spread*100).toFixed(1)}% 满足税收覆盖条件 (卖出价/买入价=${actualRatio.toFixed(4)} > ${breakEvenRatio.toFixed(4)})，套利有利可图。`;
            profitStatusDiv.className = 'status ok';
        } else {
            profitStatusDiv.innerHTML = `⚠️ 当前价差 ${(spread*100).toFixed(1)}% 不足以覆盖双向5%交易税 (需卖出价/买入价 > 1.05263)，建议将价差提高至6%以上。`;
            profitStatusDiv.className = 'status warn';
        }
    }

    poolUInput.addEventListener('input', compute);
    poolHInput.addEventListener('input', compute);
    spreadSlider.addEventListener('input', compute);
    safetySlider.addEventListener('input', compute);
    compute();
</script>
</body>
</html>
