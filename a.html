<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Web3 Wallet Pro</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/dist/index.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.card{
background:#1e293b;
border-radius:16px;
padding:20px;
margin-bottom:16px;
}

.btn{
background:#7c3aed;
padding:12px;
border-radius:10px;
width:100%;
margin-top:10px;
}

input{
background:#020617;
padding:10px;
border-radius:10px;
width:100%;
margin-top:8px;
}

</style>

</head>

<body class="max-w-md mx-auto p-4">

<h1 class="text-2xl mb-6 font-bold">Web3 Wallet</h1>

<div class="card">

<div>Address</div>
<div id="address">Not connected</div>

<div class="mt-3">Balance</div>
<div id="balance">0</div>

<canvas id="qrcode"></canvas>

</div>

<div class="card">

Network

<select id="network" class="text-black w-full p-2 mt-2 rounded">

<option value="bnb">BNB Chain</option>
<option value="xlayer">X Layer</option>

</select>

</div>

<div class="card">

<h2>Create Wallet</h2>

<button class="btn" onclick="createWallet()">Create</button>

<div id="mnemonic"></div>

</div>

<div class="card">

<h2>Import Wallet</h2>

<input id="privateKeyInput" placeholder="Private Key">

<button class="btn" onclick="importWallet()">Import</button>

</div>

<div class="card">

<h2>Send</h2>

<input id="to" placeholder="To address">

<input id="amount" placeholder="Amount">

<button class="btn" onclick="send()">Send</button>

</div>

<div class="card">

<h2>Token Balance</h2>

<input id="tokenAddress" placeholder="Token Contract">

<button class="btn" onclick="getTokenBalance()">Check</button>

<div id="tokenBalance"></div>

</div>

<div class="card">

<h2>NFT Balance</h2>

<input id="nftAddress" placeholder="ERC721 Contract">

<button class="btn" onclick="getNFT()">Check NFT</button>

<div id="nftBalance"></div>

</div>

<div class="card">

<h2>Swap UI</h2>

<input id="swapFrom" placeholder="Token A">

<input id="swapTo" placeholder="Token B">

<input id="swapAmount" placeholder="Amount">

<button class="btn">Swap (UI Demo)</button>

</div>

<div class="card">

<h2>DApp Browser</h2>

<input id="dappUrl" placeholder="https://">

<button class="btn" onclick="openDapp()">Open</button>

</div>

<script>

let wallet
let provider

const RPC={

bnb:"https://bsc-dataseed.binance.org",

xlayer:"https://rpc.xlayer.tech"

}

function connectProvider(){

let net=document.getElementById("network").value

provider=new ethers.providers.JsonRpcProvider(RPC[net])

}

async function createWallet(){

connectProvider()

let mnemonic=bip39.generateMnemonic()

let walletMnemonic=ethers.Wallet.fromMnemonic(mnemonic)

wallet=walletMnemonic.connect(provider)

document.getElementById("address").innerText=wallet.address

document.getElementById("mnemonic").innerText=mnemonic

QRCode.toCanvas(document.getElementById("qrcode"),wallet.address)

updateBalance()

}

async function importWallet(){

connectProvider()

let pk=document.getElementById("privateKeyInput").value

wallet=new ethers.Wallet(pk,provider)

document.getElementById("address").innerText=wallet.address

QRCode.toCanvas(document.getElementById("qrcode"),wallet.address)

updateBalance()

}

async function updateBalance(){

let bal=await provider.getBalance(wallet.address)

bal=ethers.utils.formatEther(bal)

document.getElementById("balance").innerText=bal

}

async function send(){

let to=document.getElementById("to").value

let amt=document.getElementById("amount").value

let tx=await wallet.sendTransaction({

to:to,

value:ethers.utils.parseEther(amt)

})

alert("TX:"+tx.hash)

}

async function getTokenBalance(){

let addr=document.getElementById("tokenAddress").value

let abi=[

"function balanceOf(address) view returns (uint256)",

"function decimals() view returns (uint8)"

]

let contract=new ethers.Contract(addr,abi,provider)

let dec=await contract.decimals()

let bal=await contract.balanceOf(wallet.address)

bal=bal/10**dec

document.getElementById("tokenBalance").innerText=bal

}

async function getNFT(){

let addr=document.getElementById("nftAddress").value

let abi=[

"function balanceOf(address) view returns(uint256)"

]

let contract=new ethers.Contract(addr,abi,provider)

let bal=await contract.balanceOf(wallet.address)

document.getElementById("nftBalance").innerText=bal

}

function openDapp(){

let url=document.getElementById("dappUrl").value

window.open(url)

}

</script>

</body>

</html>
