<!DOCTYPE html>
<html>
<head>
    <title>测试 X Layer RPC 连接</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
</head>
<body>
    <h2>测试 RPC 连接</h2>
    <button onclick="testRPC()">测试连接</button>
    <pre id="output">等待点击...</pre>

    <script>
        const FUNCTION_URL = 'https://nqqbtjthryxlwfylfcvd.supabase.co/functions/v1/proxy-rpc';

        // 自定义 Provider
        class CustomProvider extends ethers.JsonRpcProvider {
            async send(method, params) {
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.result;
            }
        }

        async function testRPC() {
            const output = document.getElementById('output');
            output.innerText = '连接中...';
            try {
                const provider = new CustomProvider();
                const blockNumber = await provider.getBlockNumber();
                output.innerText = `✅ 连接成功！当前区块高度: ${blockNumber}`;
            } catch (err) {
                output.innerText = `❌ 连接失败: ${err.message}`;
                console.error(err);
            }
        }
    </script>
</body>
</html>
