<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>字效交互 · 移动风格指南</title>
  <style>
    /* ----- 全局设计 —— 深色磨砂质感，适合APP背景 ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #1b2635, #0b0f17);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1300px;
      width: 100%;
    }

    /* 标题区域 */
    .header {
      margin-bottom: 3rem;
      text-align: left;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #ffffff 0%, #c0ccf0 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .subhead {
      font-size: 1.2rem;
      color: #9aa8c7;
      margin-top: 0.5rem;
      font-weight: 400;
      border-left: 4px solid #4a80e5;
      padding-left: 1.2rem;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(2px);
    }

    /* 网格 —— 卡片式瀑布 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.8rem;
      margin: 3rem 0 2.5rem;
    }

    /* 卡片通用样式 —— 玻璃质感，圆润 */
    .card {
      background: rgba(20, 28, 45, 0.7);
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 36px;
      padding: 2rem 1.5rem 1.8rem;
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.06);
      transition: transform 0.25s ease, border-color 0.2s, box-shadow 0.4s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: default;
      -webkit-tap-highlight-color: transparent;  /* 移动端去除点击闪灰 */
    }

    /* 卡片悬停/轻触时轻微抬起 (提升交互感) */
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 50px -18px #000d1a, 0 0 0 1px rgba(100, 180, 255, 0.2) inset;
    }

    /* 移动端点击反馈 (与悬停逻辑互补) */
    .card:active {
      transform: scale(0.98) translateY(-3px);
      transition: transform 0.1s;
    }

    /* 效果名称 (小标题) */
    .effect-name {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 500;
      color: #90a4d4;
      background: rgba(10, 20, 35, 0.7);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    /* 示例文本 — 巨大，展示字体效果 */
    .sample-text {
      font-size: clamp(3.2rem, 10vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin: 0.5rem 0 0.8rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      word-break: break-word;
      width: 100%;
      text-rendering: optimizeLegibility;
    }

    /* 描述文字 */
    .effect-desc {
      font-size: 0.95rem;
      color: #b0c2e6;
      background: rgba(0, 0, 0, 0.25);
      padding: 0.45rem 1.1rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.04);
      margin-top: 0.8rem;
    }

    /* ----- 每个卡片独特的字体效果 & 交互 (hover / active 双触发) ----- */
    /* 为了让移动端点击也能看到变化，同时使用 :hover 和 :active */

    /* 卡片 1 — 重阴影 · 立体悬浮 */
    .card-1 .sample-text {
      color: #ffffff;
      text-shadow: 4px 4px 0 #3f4e7a, 8px 8px 0 #1e2a44, 12px 12px 0 #0c1424;
      transition: text-shadow 0.25s, color 0.2s;
    }
    .card-1:hover .sample-text,
    .card-1:active .sample-text {
      text-shadow: 2px 2px 0 #6688ee, 5px 5px 0 #3a58a0, 9px 9px 0 #1b2b55, 13px 13px 0 #0c162f;
      color: #f0f5ff;
    }

    /* 卡片 2 — 渐变 · 流光 */
    .card-2 .sample-text {
      background: linear-gradient(135deg, #f7971e, #ffd200, #84fab0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
    }
    .card-2:hover .sample-text,
    .card-2:active .sample-text {
      background: linear-gradient(145deg, #ff6a88, #ff99ac, #a1c4fd, #c2e9fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300% 300%;
      filter: drop-shadow(0 0 9px rgba(255,200,100,0.6));
    }

    /* 卡片 3 — 霓虹发光 */
    .card-3 .sample-text {
      color: #ffffff;
      text-shadow: 0 0 5px #ff66cc, 0 0 10px #ff44aa, 0 0 20px #ff2299, 0 0 30px #ff0080;
    }
    .card-3:hover .sample-text,
    .card-3:active .sample-text {
      text-shadow: 0 0 8px #ff99ee, 0 0 18px #ff66cc, 0 0 30px #ff33aa, 0 0 45px #ff0099, 0 0 60px #ff0066;
      color: #ffe6ff;
    }

    /* 卡片 4 — 描边 · 镂空 */
    .card-4 .sample-text {
      color: transparent;
      -webkit-text-stroke: 3px #57ccff;
      text-stroke: 3px #57ccff;
      font-weight: 800;
    }
    .card-4:hover .sample-text,
    .card-4:active .sample-text {
      -webkit-text-stroke: 2px #b3e6ff;
      text-stroke: 2px #b3e6ff;
      color: rgba(255, 255, 255, 0.15);  /* 微填充 */
      text-shadow: 0 0 12px #57ccff;
    }

    /* 卡片 5 — 浮雕 / 压印 (深色背景上) */
    .card-5 .sample-text {
      color: #212c42;
      text-shadow: -1px -1px 0 #6d7fa0, 1px 1px 0 #000000, 2px 2px 0 #10131e;
    }
    .card-5:hover .sample-text,
    .card-5:active .sample-text {
      color: #23304b;
      text-shadow: -2px -2px 0 #9fb0d0, 2px 2px 0 #030407, 4px 4px 2px #000000;
    }

    /* 卡片 6 — 模糊 + 清晰交互 */
    .card-6 .sample-text {
      color: #eef5ff;
      filter: blur(2px);
      opacity: 0.9;
      transition: filter 0.3s, opacity 0.2s;
    }
    .card-6:hover .sample-text,
    .card-6:active .sample-text {
      filter: blur(0);
      opacity: 1;
      text-shadow: 0 0 15px #99bbff;
    }

    /* 卡片 7 — 金属拉丝 / 3D光泽 */
    .card-7 .sample-text {
      background: linear-gradient(135deg, #cfd9e6 0%, #e8edf5 30%, #9faec9 70%, #bec8dd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3), -1px -1px 2px rgba(255,255,255,0.2);
    }
    .card-7:hover .sample-text,
    .card-7:active .sample-text {
      background: linear-gradient(145deg, #f0f4fa, #cbd2e3, #b1bedc, #dbe2f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 4px 4px 8px #00000066, -2px -2px 4px #ffffff40;
    }

    /* 卡片 8 — 打字机 · 等宽 + 光标 (伪元素交互) */
    .card-8 .sample-text {
      font-family: 'Courier New', Courier, monospace;
      color: #b7d0ff;
      border-right: 3px solid #6d94dd;
      padding-right: 5px;
      animation: blinkCursor 1s infinite step-end;
      letter-spacing: 1px;
    }
    @keyframes blinkCursor {
      50% { border-color: transparent; }
    }
    .card-8:hover .sample-text,
    .card-8:active .sample-text {
      color: #ffffff;
      border-right-color: #ffcc66;
      animation: none;  /* 悬停时停止闪烁，字体加粗 */
      font-weight: 700;
      text-shadow: 0 0 6px #b7d0ff;
    }

    /* 卡片 9 — 手写 · 摇摆 */
    .card-9 .sample-text {
      font-family: 'Segoe Script', 'Brush Script MT', cursive;
      font-weight: 400;
      transform: rotate(-1deg);
      text-shadow: 2px 2px 2px #2f4172;
      transition: transform 0.2s, text-shadow 0.3s;
    }
    .card-9:hover .sample-text,
    .card-9:active .sample-text {
      transform: rotate(2deg) scale(1.08);
      text-shadow: 6px 6px 8px #1f2e55, -2px -2px 4px #e0d9ff;
      color: #ffe2a4;
    }

    /* 卡片 10 — 波浪下划线 / 特效 */
    .card-10 .sample-text {
      color: #d2e0ff;
      text-decoration: underline wavy #6699ee 3px;
      text-underline-offset: 12px;
      transition: text-decoration-color 0.2s, text-underline-offset 0.2s, color 0.2s;
    }
    .card-10:hover .sample-text,
    .card-10:active .sample-text {
      color: #ffffff;
      text-decoration-color: #ffaa66;
      text-underline-offset: 18px;
      text-decoration-thickness: 5px;
      text-shadow: 0 4px 8px #224488;
    }

    /* 卡片 11 — 粗糙/颗粒质感 (用阴影模拟) */
    .card-11 .sample-text {
      color: #f0e9d8;
      text-shadow: 2px 2px 0 #5b4949, 4px 4px 0 #3b2e2e, 1px -1px 0 #ffffbb;
      opacity: 0.95;
    }
    .card-11:hover .sample-text,
    .card-11:active .sample-text {
      text-shadow: 3px 3px 0 #aa8866, 6px 6px 0 #5f4433, -1px -2px 0 #ffeeaa, 2px -1px 0 #ffeeaa;
      color: #fff7e6;
    }

    /* 卡片 12 — 窄字距 + 宽字距 交互 */
    .card-12 .sample-text {
      color: #e7ecff;
      letter-spacing: -2px;
      font-weight: 700;
      transition: letter-spacing 0.25s, text-shadow 0.2s;
    }
    .card-12:hover .sample-text,
    .card-12:active .sample-text {
      letter-spacing: 8px;
      text-shadow: 0 0 10px #aaccff, 0 0 20px #5698f0;
      color: #ffffff;
    }

    /* 页脚小提示 */
    .footer-note {
      text-align: center;
      color: #6a7da0;
      font-size: 0.95rem;
      border-top: 1px dashed rgba(255,255,255,0.1);
      padding-top: 2rem;
      margin-top: 1rem;
      letter-spacing: 0.5px;
    }
    .footer-note span {
      background: #1b253b;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      backdrop-filter: blur(5px);
    }

    /* 微调移动端 */
    @media (max-width: 550px) {
      h1 { font-size: 2.1rem; }
      .grid { gap: 1.2rem; }
      .card { padding: 1.5rem 1rem; }
      .sample-text { font-size: 3.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>字体效果交互<br>用于APP整体风格</h1>
      <div class="subhead">悬停 · 点击 —— 每个卡片都藏有动态字效</div>
    </div>

    <!-- 卡片网格 · 12种字体交互 -->
    <div class="grid">
      <!-- 1. 立体重影 -->
      <div class="card card-1">
        <span class="effect-name">立体偏移</span>
        <div class="sample-text">SHADOW</div>
        <span class="effect-desc">悬停增强3D层次</span>
      </div>
      <!-- 2. 渐变流光 -->
      <div class="card card-2">
        <span class="effect-name">渐变流动</span>
        <div class="sample-text">GRADIENT</div>
        <span class="effect-desc">轻触改变色调</span>
      </div>
      <!-- 3. 霓虹光效 -->
      <div class="card card-3">
        <span class="effect-name">霓虹光</span>
        <div class="sample-text">NEON</div>
        <span class="effect-desc">光晕扩散收缩</span>
      </div>
      <!-- 4. 描边镂空 -->
      <div class="card card-4">
        <span class="effect-name">描边/镂空</span>
        <div class="sample-text">STROKE</div>
        <span class="effect-desc">描边加粗+发光</span>
      </div>
      <!-- 5. 浮雕压印 -->
      <div class="card card-5">
        <span class="effect-name">浮雕/压印</span>
        <div class="sample-text">EMBOSS</div>
        <span class="effect-desc">凹陷与凸起切换</span>
      </div>
      <!-- 6. 模糊变清晰 -->
      <div class="card card-6">
        <span class="effect-name">模糊对焦</span>
        <div class="sample-text">BLUR</div>
        <span class="effect-desc">悬停即清晰</span>
      </div>
      <!-- 7. 金属质感 -->
      <div class="card card-7">
        <span class="effect-name">金属拉丝</span>
        <div class="sample-text">METAL</div>
        <span class="effect-desc">光泽流动</span>
      </div>
      <!-- 8. 打字机风格 -->
      <div class="card card-8">
        <span class="effect-name">打字机</span>
        <div class="sample-text">TYPE</div>
        <span class="effect-desc">光标·悬停加粗</span>
      </div>
      <!-- 9. 手写摇曳 -->
      <div class="card card-9">
        <span class="effect-name">手写体</span>
        <div class="sample-text">Cursive</div>
        <span class="effect-desc">悬停摇摆+阴影</span>
      </div>
      <!-- 10. 波浪下划线 -->
      <div class="card card-10">
        <span class="effect-name">波浪线</span>
        <div class="sample-text">WAVY</div>
        <span class="effect-desc">下划线上浮</span>
      </div>
      <!-- 11. 颗粒粗糙 -->
      <div class="card card-11">
        <span class="effect-name">粗糙颗粒</span>
        <div class="sample-text">GRIT</div>
        <span class="effect-desc">阴影置换</span>
      </div>
      <!-- 12. 字距爆发 -->
      <div class="card card-12">
        <span class="effect-name">字距变化</span>
        <div class="sample-text">SPACING</div>
        <span class="effect-desc">密集→宽松</span>
      </div>
    </div>

    <div class="footer-note">
      <span>✨ 点击/悬停卡片 — 每个字体效果都带有动态交互，适合APP设计探索 ✨</span>
    </div>
  </div>

  <!-- 极简JS：确保移动端触摸时也能触发:active样式（已用css处理）同时可增加一点触感 -->
  <script>
    (function() {
      // 让所有卡片在移动端触摸时有更明显的类切换（辅助:active）
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        card.addEventListener('touchstart', function(e) {
          // 无需额外操作，css :active已经生效，为了防止页面滚动时干扰，可加一点防误触
        }, { passive: true });
      });
      // 说明：设计上 hover 和 active 共用效果，移动端点击会立刻看到字体变化。
    })();
  </script>
</body>
</html>
