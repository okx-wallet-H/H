<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海豚舰队 · Boost Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:Inter;
    background:linear-gradient(180deg,#f7f5ff 0%,#ffffff 60%);
    color:#1e1e2f;
}

/* 顶部 */
.hero{
    padding:2rem 1.5rem;
    text-align:center;
}
.hero h1{font-size:1.8rem;color:#4a3a8c;}
.hero p{color:#7a6bb0;font-size:0.9rem;margin-top:5px;}

/* 资产模块 */
.top-stats{
    display:flex;
    gap:12px;
    padding:0 1.5rem;
}
.stat-box{
    flex:1;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border-radius:18px;
    padding:1rem;
    border:1px solid rgba(120,100,255,0.2);
}
.big{
    font-size:1.5rem;
    font-weight:600;
}
.green{color:#16c784;}

/* 卡片 */
.container{padding:1.5rem;}
.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    border-radius:22px;
    padding:1rem;
    margin-bottom:1.2rem;
    border:1px solid rgba(120,100,255,0.2);
}

/* 按钮 */
.btn{
    width:100%;
    padding:0.9rem;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,#6b4eff,#9f7bff);
    color:#fff;
    font-weight:600;
    margin-top:10px;
    box-shadow:0 10px 25px rgba(107,78,255,0.4);
}

/* K线 */
.chart{
    width:100%;
    height:220px;
    border:none;
    border-radius:16px;
}

/* 动态 */
.feed div{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    font-size:0.85rem;
}

/* FOMO */
.fomo{
    background:#fff5f5;
    color:#ff4d6d;
    padding:0.7rem;
    border-radius:12px;
    text-align:center;
    font-size:0.85rem;
    margin-top:10px;
}

/* toast */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#000;
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    font-size:0.8rem;
}
</style>
</head>

<body>

<div class="hero">
    <h1>OKX Boost 收益计划</h1>
    <p>海豚社区协同策略 · 资产增值系统</p>
</div>

<div class="top-stats">
    <div class="stat-box">
        <div>总资产</div>
        <div class="big">$12,450</div>
    </div>
    <div class="stat-box">
        <div>累计收益</div>
        <div class="big green" id="reward">1284</div>
    </div>
</div>

<div class="container">

    <div class="card">
        <iframe class="chart"
        src="https://s.tradingview.com/widgetembed/?symbol=OKX:BTCUSDT&interval=240">
        </iframe>
    </div>

    <div class="card">
        <div>实时成交</div>
        <div class="feed" id="feed"></div>
    </div>

    <div class="card">
        <div>我的收益进度</div>
        <div id="progress">8450 / 10000 USDT</div>
        <button class="btn" onclick="trade()">前往交易</button>
    </div>

    <div class="fomo">
        🔥 今日已有 1,284 人加入，团队收益 +84,230 H
    </div>

</div>

<script>
function toast(msg){
    const t=document.createElement('div');
    t.className='toast';
    t.innerText=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

function trade(){
    toast('跳转交易中...');
}

/* 动态数字 */
function animate(){
    let el=document.getElementById('reward');
    let val=parseInt(el.innerText);
    val+=Math.floor(Math.random()*5);
    el.innerText=val;
}
setInterval(animate,2000);

/* 模拟成交 */
function updateFeed(){
    const feed=document.getElementById('feed');
    const price=(0.124+Math.random()*0.002).toFixed(4);
    const item=document.createElement('div');
    item.innerHTML=`<span>0x${Math.random().toString(16).slice(2,6)}...</span><span>${price}</span>`;
    feed.prepend(item);
    if(feed.children.length>6) feed.removeChild(feed.lastChild);
}
setInterval(updateFeed,3000);
</script>

</body>
</html>
