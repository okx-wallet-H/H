<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>xLayer USDT 转账记录查询 · 海豚工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --primary: #7C3AED;
            --primary-light: #9B4DFF;
            --bg-color: #F8F9FA;
            --text-main: #1C1C28;
            --text-muted: #8F90A6;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 24px 48px -12px rgba(45, 21, 100, 0.12);
            --success: #10B981;
            --danger: #EF4444;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: var(--text-main);
            padding: 20px 16px 60px;
            overflow-x: hidden;
            position: relative;
        }
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(145deg, #F4F0FF 0%, #F0E9FF 100%);
        }
        .ambient-bg::before,
        .ambient-bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 12s ease-in-out infinite alternate;
        }
        .ambient-bg::before {
            width: 350px;
            height: 350px;
            background: rgba(124, 58, 237, 0.3);
            top: -100px;
            left: -100px;
        }
        .ambient-bg::after {
            width: 300px;
            height: 300px;
            background: rgba(16, 185, 129, 0.15);
            bottom: 10%;
            right: -80px;
            animation-delay: -6s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .input-group {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 60px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }
        .input-group label {
            font-weight: 600;
            color: var(--primary);
            min-width: 90px;
        }
        .input-group input {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 700;
            color: white;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.25);
            margin-top: 8px;
        }
        .btn-gradient:active { transform: scale(0.98); }
        .btn-gradient:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { margin-top: 16px; overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th {
            background: rgba(124, 58, 237, 0.15);
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            word-break: break-all;
        }
        .hash-link {
            color: var(--primary);
            text-decoration: none;
            font-family: monospace;
            font-size: 0.75rem;
        }
        .hash-link:hover { text-decoration: underline; }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .error {
            color: var(--danger);
            text-align: center;
            padding: 20px;
        }
        .info-tip {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
        }
        .badge {
            background: #F3E8FF;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mt-2 { margin-top: 8px; }
    </style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="container">
    <div class="card">
        <h1>🔍 xLayer USDT 转账记录</h1>
        <div class="sub">使用 OKLink API 查询地址历史交易</div>

        <div class="input-group">
            <label>🔑 OKLink API Key</label>
            <input type="text" id="apiKeyInput" placeholder="免费申请：https://www.oklink.com/cn/api" value="">
        </div>
        <div class="input-group">
            <label>📮 钱包地址</label>
            <input type="text" id="addressInput" placeholder="0x...">
        </div>
        <div class="input-group">
            <label>📦 USDT 合约地址 (xLayer)</label>
            <input type="text" id="contractInput" value="0x1E4A596bABE0C6F32BE9e7EbDeBfE6C6BcB4Df35">
        </div>
        <div class="input-group">
            <label>🌐 链名称</label>
            <input type="text" id="chainName" value="xlayer" readonly>
        </div>

        <button class="btn-gradient" id="queryBtn">查询转账记录</button>
        <div class="info-tip">💡 提示：<a href="https://www.oklink.com/cn/api" target="_blank" style="color:var(--primary)">OKLink API Key</a> 免费申请，xLayer 链短名为 <code>xlayer</code>。USDT 合约地址已预填，如需查询其他代币请修改。</div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div class="flex-between">
            <span class="badge">📄 查询结果</span>
            <span id="resultCount" class="badge">0 条</span>
        </div>
        <div id="resultContent" class="result-area"></div>
    </div>
</div>

<script>
    const OKLINK_API_BASE = 'https://www.oklink.com/api/v5/explorer/address/address-transaction';
    const DEFAULT_USDT_CONTRACT = '0x1E4A596bABE0C6F32BE9e7EbDeBfE6C6BcB4Df35';
    const apiKeyInput = document.getElementById('apiKeyInput');
    const addressInput = document.getElementById('addressInput');
    const contractInput = document.getElementById('contractInput');
    const queryBtn = document.getElementById('queryBtn');
    const resultCard = document.getElementById('resultCard');
    const resultContent = document.getElementById('resultContent');
    const resultCountSpan = document.getElementById('resultCount');

    if (localStorage.getItem('oklink_api_key')) apiKeyInput.value = localStorage.getItem('oklink_api_key');
    if (localStorage.getItem('last_address')) addressInput.value = localStorage.getItem('last_address');

    apiKeyInput.addEventListener('change', () => localStorage.setItem('oklink_api_key', apiKeyInput.value));
    addressInput.addEventListener('change', () => localStorage.setItem('last_address', addressInput.value));

    async function queryTransactions() {
        const apiKey = apiKeyInput.value.trim();
        const address = addressInput.value.trim();
        const tokenContract = contractInput.value.trim();

        if (!apiKey) { alert('请填写 OKLink API Key'); return; }
        if (!address) { alert('请填写钱包地址'); return; }
        if (!tokenContract) { alert('请填写 USDT 合约地址'); return; }

        resultCard.style.display = 'block';
        resultContent.innerHTML = '<div class="loading">⏳ 正在查询，请稍候...</div>';
        resultCountSpan.innerText = '加载中';
        queryBtn.disabled = true;
        queryBtn.innerText = '查询中...';

        try {
            // 注意：链短名使用 'xlayer'，符合 OKLink 规范
            const url = `${OKLINK_API_BASE}?chainShortName=xlayer&address=${address}&limit=50&protocolType=token_20`;
            const response = await fetch(url, {
                headers: { 'Ok-Access-Key': apiKey, 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.code !== '0') throw new Error(data.msg || 'API 返回错误');

            const records = data.data?.hits || [];
            const usdtTransfers = records.filter(tx =>
                tx.tokenTransfers?.some(transfer => transfer.contractAddress?.toLowerCase() === tokenContract.toLowerCase())
            );

            if (usdtTransfers.length === 0) {
                resultContent.innerHTML = '<div class="loading">📭 未找到 USDT 转账记录</div>';
                resultCountSpan.innerText = '0';
                return;
            }

            let html = '</td><thead>——
<th>交易哈希</th><th>时间</th><th>类型</th><th>数量</th><th>对方地址</th>
</thead><tbody>';
            for (const tx of usdtTransfers) {
                const txHash = tx.txId || tx.hash;
                const timestamp = tx.transactionTime ? new Date(tx.transactionTime).toLocaleString() : (tx.blockTime ? new Date(tx.blockTime).toLocaleString() : '未知');
                for (const transfer of tx.tokenTransfers) {
                    if (transfer.contractAddress?.toLowerCase() !== tokenContract.toLowerCase()) continue;
                    const from = transfer.from;
                    const to = transfer.to;
                    const value = transfer.value ? (parseFloat(transfer.value) / 1e18).toFixed(6) : '0';
                    const isSent = from.toLowerCase() === address.toLowerCase();
                    const type = isSent ? '转出 ➡️' : '转入 ⬅️';
                    const counterparty = isSent ? to : from;
                    html += `——
<td><a href="https://www.oklink.com/xlayer/tx/${txHash}" target="_blank" class="hash-link">${txHash.slice(0, 10)}...${txHash.slice(-8)}</a></td>
<td>${timestamp}</td>
<td>${type}</td>
<td>${value} USDT</td>
<td class="hash-link" title="${counterparty}">${counterparty.slice(0, 10)}...${counterparty.slice(-6)}</td>
</tr>`;
                }
            }
            html += '</tbody></table>';
            resultContent.innerHTML = html;
            resultCountSpan.innerText = usdtTransfers.length;
        } catch (err) {
            console.error(err);
            resultContent.innerHTML = `<div class="error">❌ 查询失败：${err.message}</div>`;
            resultCountSpan.innerText = '错误';
        } finally {
            queryBtn.disabled = false;
            queryBtn.innerText = '查询转账记录';
        }
    }

    queryBtn.addEventListener('click', queryTransactions);
    if (!contractInput.value) contractInput.value = DEFAULT_USDT_CONTRACT;
</script>
</body>
</html>
