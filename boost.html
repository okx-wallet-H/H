<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f7f7fb;
    color: #111;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 600;
    font-size: 20px;
    background: linear-gradient(90deg,#a855f7,#d4af37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.button {
    padding: 10px 18px;
    border-radius: 8px;
    background: linear-gradient(90deg,#a855f7,#d4af37);
    color: white;
    border: none;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.title {
    font-size: 14px;
    color: #888;
}

.value {
    font-size: 24px;
    margin-top: 10px;
    font-weight: 600;
}

.big {
    font-size: 32px;
}

.boost {
    color: #a855f7;
}

.section {
    margin-top: 30px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="logo">Strategy Protocol</div>
    <button class="button" onclick="connectWallet()">连接钱包</button>
</div>

<!-- 数据面板 -->
<div class="grid">

<div class="card">
    <div class="title">质押资产</div>
    <div class="value" id="stake">0</div>
</div>

<div class="card">
    <div class="title">今日收益</div>
    <div class="value" id="daily">0</div>
</div>

<div class="card">
    <div class="title">累计收益</div>
    <div class="value" id="total">0</div>
</div>

<div class="card">
    <div class="title">Boost等级</div>
    <div class="value boost" id="boost">Lv.0</div>
</div>

<div class="card">
    <div class="title">贡献度</div>
    <div class="value" id="score">0</div>
</div>

<div class="card">
    <div class="title">网格状态</div>
    <div class="value" id="grid">未启动</div>
</div>

</div>

<!-- 质押 -->
<div class="section card">
    <div class="title">质押代币</div>
    <input type="number" id="stakeInput" placeholder="输入数量">
    <button class="button" onclick="stakeToken()">质押</button>
</div>

<!-- 策略 -->
<div class="section card">
    <div class="title">网格策略</div>
    <button class="button" onclick="startGrid()">启动策略</button>
</div>

</div>

<script>

let user = {
    stake: 0,
    daily: 0,
    total: 0,
    boost: 0,
    score: 0,
    grid: false
}

function connectWallet(){
    alert("钱包已连接（模拟）")
}

function stakeToken(){
    let amount = Number(document.getElementById("stakeInput").value)
    if(amount <= 0) return

    user.stake += amount
    update()
}

function startGrid(){
    user.grid = true
    document.getElementById("grid").innerText = "运行中"

    setInterval(()=>{
        let profit = user.stake * (Math.random()*0.002)

        user.daily += profit
        user.total += profit
        user.score += profit * 10

        user.boost = Math.floor(user.score / 100)

        update()
    },2000)
}

function update(){
    document.getElementById("stake").innerText = user.stake.toFixed(2)
    document.getElementById("daily").innerText = user.daily.toFixed(4)
    document.getElementById("total").innerText = user.total.toFixed(4)
    document.getElementById("boost").innerText = "Lv." + user.boost
    document.getElementById("score").innerText = user.score.toFixed(2)
}

</script>

</body>
</html>
